<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cizgi Film Izle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Fredoka One', cursive;
    background: #FFFDF0;
    text-align: center;
    padding-bottom: 120px;
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
}

header {
    background: #FF595E;
    padding: 20px;
    color: white;
    font-size: 22px;
    border-bottom: 6px solid #D6454B;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
}

.video-container {
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* Pofuduk Video Kartlari */
.video-card {
    background: white;
    border-radius: 25px 35px 20px 40px;
    padding: 15px;
    box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    transition: transform 0.2s;
}

.video-card:active { transform: scale(0.98); }

.video-card h3 {
    margin: 10px 0 15px 0;
    color: #333;
    font-size: 20px;
}

/* Video Cercevesi */
.video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 20px;
    overflow: hidden;
    background: #000;
    border: 3px solid #eee;
}

.video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
}

/* Kart Renkleri */
.card-cedric { border: 5px solid #FFCA3A; box-shadow: 8px 8px 0px rgba(255, 202, 58, 0.2); }
.card-tom { border: 5px solid #1982C4; box-shadow: 8px 8px 0px rgba(25, 130, 196, 0.2); }
.card-sirinler { border: 5px solid #66BB6A; box-shadow: 8px 8px 0px rgba(102, 187, 106, 0.2); }
.card-caillou { border: 5px solid #FF595E; box-shadow: 8px 8px 0px rgba(255, 89, 94, 0.2); }

/* ALT MENU */
.candy-nav {
    position: fixed;
    bottom: 15px; left: 15px; right: 15px;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 12px;
    border-radius: 40px;
    border: 4px solid #FF595E;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.nav-link {
    text-decoration: none;
    font-size: 24px;
    color: #DDD;
}
.nav-link.active { color: #FF595E; }
</style>
</head>
<body>

<header>🎬 CIZGI FILM IZLE</header>

<div class="video-container">
    
    <div class="video-card card-cedric">
        <h3>Cedric</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/bxeJYeqeQn0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="video-card card-tom">
        <h3>Tom ve Jerry</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/pEl3-0GHyoQ" allowfullscreen></iframe>
        </div>
    </div>

    <div class="video-card card-sirinler">
        <h3>Sirinler - Numara Yapma</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/wh2HzUCYU60" allowfullscreen></iframe>
        </div>
    </div>

    <div class="video-card card-caillou">
        <h3>Caillou</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/wkLwG6s8q5g" allowfullscreen></iframe>
        </div>
    </div>

</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link">🏠</a>
    <a href="videolar.html" class="nav-link active">🎬</a>
</nav>

</body>
</html>
