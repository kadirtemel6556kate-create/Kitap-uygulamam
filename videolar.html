<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videolar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding-bottom: 100px; }
        header { padding: 25px 20px; background: #111; border-bottom: 1px solid #222; text-align: center; }
        h1 { color: #1DB954; font-size: 24px; }
        
        /* Video Liste Tasarımı */
        .video-list { padding: 15px; }
        .video-item {
            display: flex;
            background: #181818;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #282828;
            align-items: center;
        }
        .video-thumbnail { width: 140px; height: 80px; flex-shrink: 0; position: relative; }
        .video-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .video-thumbnail i { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 24px; }
        .video-details { padding: 10px; }
        .video-details h3 { margin: 0; font-size: 14px; color: #fff; line-height: 1.4; }
        .video-details span { font-size: 12px; color: #b3b3b3; display: block; margin-top: 5px; }

        /* VİDEO PENCERESİ (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; }
        .modal-content { position: relative; margin: 20% auto; width: 90%; max-width: 800px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-video { position: absolute; top: -40px; right: 0; color: #1db954; font-size: 30px; cursor: pointer; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 1px solid #282828; }
