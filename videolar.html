<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cizgi Film Izle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Fredoka One', cursive;
    background: #FFFDF0;
    text-align: center;
    padding-bottom: 120px;
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
}

header {
    background: #FF595E; /* Cizgi film sayfasi icin canli kirmizi */
    padding: 20px;
    color: white;
    font-size: 22px;
    border-bottom: 6px solid #D6454B;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
}

.video-container {
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Video Kart Tasarimi */
.video-card {
    background: white;
    border-radius: 25px 35px 20px 40px;
    border: 5px solid #FF595E;
    padding: 15px;
    box-shadow: 8px 8px 0px rgba(255, 89, 94, 0.1);
    overflow: hidden;
}

.video-card h3 {
    margin: 10px 0;
    color: #333;
    font-size: 18px;
}

/* Video Cercevesi (Uygulamanın icinde kalmasi icin) */
.video-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 Oran */
    height: 0;
    border-radius: 15px;
    overflow: hidden;
    background: #eee;
}

.video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
}

/* ALT MENU */
.candy-nav {
    position: fixed;
    bottom: 15px; left: 15px; right: 15px;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 12px;
    border-radius: 40px;
    border: 4px solid #FF595E;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.nav-link {
    text-decoration: none;
    font-size: 22px;
    color: #BBB;
}
.nav-link.active { color: #FF595E; }
</style>
</head>
<body>

<header>🎬 CIZGI FILM IZLE</header>

<div class="video-container">
    
    <div class="video-card">
        <h3>Cedric - Bolum 1</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

    <div class="video-card" style="border-color: #26C6DA;">
        <h3>Cedric - Bolum 2</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="videolar.html" class="nav-link active"><i class="fas fa-play-circle"></i></a>
</nav>

</body>
</html>
