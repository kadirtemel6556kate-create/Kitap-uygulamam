<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cizgi Filmler</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --mavi: #1982C4; --arka: #F0F9FF; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; }
        header { background: var(--mavi); padding: 25px; text-align: center; border-bottom: 8px solid #116091; }
        h1 { margin: 0; color: white; font-size: 22px; }
        
        .list-container { padding: 20px; }
        .video-item { 
            background: white; 
            border-radius: 25px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 4px solid var(--mavi);
            box-shadow: 0 6px 0 #BEE3F8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .video-info { display: flex; align-items: center; }
        .video-info i { font-size: 30px; color: var(--mavi); margin-right: 15px; }
        .video-info span { font-size: 18px; color: #444; }
        .play-btn { background: var(--mavi); color: white; padding: 10px 20px; border-radius: 15px; font-size: 14px; }

        /* Uygulama Ici Oynatici */
        #videoOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 40px; cursor: pointer;
        }
        iframe { width: 95%; height: 50%; border-radius: 15px; border: 4px solid white; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--mavi);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--mavi); }
    </style>
</head>
<body>

<header><h1>Cizgi Film Dunyasi</h1></header>

<div class="list-container">
    
    <div class="video-item" onclick="acVideo('https://www.youtube.com/embed/bxeJYeqeQn0')">
        <div class="video-info">
            <i class="fas fa-play-circle"></i>
            <span>Cedric</span>
        </div>
        <div class="play-btn">IZLE</div>
    </div>

    <div class="video-item" onclick="acVideo('https://www.youtube.com/embed/pEl3-0GHyoQ')">
        <div class="video-info">
            <i class="fas fa-tv"></i>
            <span>Tom ve Jerry</span>
        </div>
        <div class="play-btn">IZLE</div>
    </div>

    <div class="video-item" onclick="acVideo('https://www.youtube.com/embed/wOc4m1noBs0')">
        <div class="video-info">
            <i class="fas fa-child"></i>
            <span>Niloya</span>
        </div>
        <div class="play-btn">IZLE</div>
    </div>

    <div class="video-item" onclick="acVideo('https://www.youtube.com/embed/wA5b9JJxtMc')">
        <div class="video-info">
            <i class="fas fa-smile"></i>
            <span>Caillou</span>
        </div>
        <div class="play-btn">IZLE</div>
    </div>

</div>

<div id="videoOverlay">
    <span class="close-btn" onclick="kapatVideo()"><i class="fas fa-times-circle"></i></span>
    <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    <a href="videolar.html" class="nav-link active"><i class="fas fa-play-circle"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-headphones"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
    <a href="oyunlar.html" class="nav-link"><i class="fas fa-ghost"></i></a>
</nav>

<script>
    function acVideo(link) {
        document.getElementById('videoFrame').src = link;
        document.getElementById('videoOverlay').style.display = 'flex';
    }
    function kapatVideo() {
        document.getElementById('videoOverlay').style.display = 'none';
        document.getElementById('videoFrame').src = '';
    }
</script>

</body>
</html>
