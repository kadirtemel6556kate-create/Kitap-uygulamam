<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cizgi Filmler</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --mavi: #1982C4; --arka: #F0F9FF; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; }
        header { background: var(--mavi); padding: 25px; text-align: center; border-bottom: 8px solid #116091; }
        h1 { margin: 0; color: white; font-size: 22px; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .v-card { 
            background: white; border-radius: 30px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
            border: 4px solid var(--mavi); box-shadow: 0 8px 0 #BEE3F8;
            cursor: pointer; transition: 0.2s;
        }
        .v-card:active { transform: translateY(4px); box-shadow: 0 4px 0 #BEE3F8; }
        .v-card i { font-size: 45px; color: var(--mavi); margin-bottom: 10px; }
        .v-card span { font-size: 15px; color: #444; text-align: center; }

        /* Uygulama Ici Oynatici (Modal) */
        #videoPlayer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .close-vid {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 40px; cursor: pointer; z-index: 5100;
        }
        iframe { width: 90%; height: 50%; border-radius: 20px; border: 5px solid white; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--mavi);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--mavi); }
    </style>
</head>
<body>

<header><h1>Cizgi Filmler</h1></header>

<div class="video-grid">
    <div class="v-card" onclick="izle('BURAYA_VIDEO_LINKI_1')">
        <i class="fas fa-play-circle"></i>
        <span>Cizgi Film 1</span>
    </div>

    <div class="v-card" onclick="izle('BURAYA_VIDEO_LINKI_2')">
        <i class="fas fa-play-circle"></i>
        <span>Cizgi Film 2</span>
    </div>
</div>

<div id="videoPlayer">
    <span class="close-vid" onclick="kapat()"><i class="fas fa-times-circle"></i></span>
    <iframe id="vidFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    <a href="videolar.html" class="nav-link active"><i class="fas fa-play-circle"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-headphones"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
    <a href="oyunlar.html" class="nav-link"><i class="fas fa-ghost"></i></a>
</nav>

<script>
    function izle(link) {
        document.getElementById('vidFrame').src = link;
        document.getElementById('videoPlayer').style.display = 'flex';
    }
    function kapat() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('vidFrame').src = '';
    }
</script>

</body>
</html>
