<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videolar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding-bottom: 120px; }
        header { padding: 25px 20px; background: #111; border-bottom: 1px solid #222; text-align: center; }
        h1 { color: #1DB954; font-size: 24px; }
        
        /* Video Liste Tasarımı */
        .video-list { padding: 15px; }
        .video-item {
            display: flex;
            background: #181818;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #282828;
            align-items: center;
        }
        .video-thumbnail { width: 140px; height: 80px; flex-shrink: 0; position: relative; }
        .video-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .video-thumbnail i { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 24px; }
        .video-details { padding: 10px; }
        .video-details h3 { margin: 0; font-size: 14px; color: #fff; line-height: 1.4; }
        .video-details span { font-size: 12px; color: #b3b3b3; display: block; margin-top: 5px; }

        /* VİDEO PENCERESİ (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; }
        .modal-content { position: relative; margin: 20% auto; width: 95%; max-width: 800px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-video { position: absolute; top: -40px; right: 0; color: #1db954; font-size: 30px; cursor: pointer; font-weight: bold; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 1px solid #282828; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #b3b3b3; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: #fff; }

        /* PARLAYAN OYUNLAR BUTONU CSS */
        .game-btn {
            background: linear-gradient(45deg, #ff00ea, #ffcc00, #00ffcc);
            background-size: 200% 200%;
            border-radius: 12px;
            margin: 5px;
            color: #fff !important;
            animation: rainbow 3s ease infinite, pulse 1.5s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .game-btn i { color: #fff !important; }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header><h1>🎬 Video Masallar</h1></header>

    <div class="video-list">
        <div class="video-item" onclick="videoAc('dJMn3kwCYtc')">
            <div class="video-thumbnail">
                <img src="https://img.youtube.com/vi/dJMn3kwCYtc/mqdefault.jpg" alt="Video">
                <i class="fas fa-play-circle"></i>
            </div>
            <div class="video-details">
                <h3>Verilen Söz Tutulmalı</h3>
                <span>Masal Dünyası • 4:40 dk</span>
            </div>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-video" onclick="videoKapat()">&times;</span>
            <div class="video-container">
                <iframe id="videoFrame" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Anasayfa</a>
        <a href="hikayeler.html" class="nav-item"><i class="fas fa-book-open"></i>Hikayeler</a>
        <a href="videolar.html" class="nav-item active"><i class="fas fa-video"></i>Videolar</a>
        <a href="sesli-kitaplar.html" class="nav-item"><i class="fas fa-headphones"></i>Dinle</a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-paint-brush"></i>Boyama</a>
        <a href="oyunlar.html" class="nav-item game-btn"><i class="fas fa-gamepad"></i>Oyunlar</a>
    </div>

    <script>
        function videoAc(id) {
            var url = "https://www.youtube.com/embed/" + id + "?autoplay=1";
            document.getElementById('videoFrame').src = url;
            document.getElementById('videoModal').style.display = "block";
        }

        function videoKapat() {
            document.getElementById('videoModal').style.display = "none";
            document.getElementById('videoFrame').src = ""; 
        }
    </script>

</body>
</html>
