<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ES4TNM5TRC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ES4TNM5TRC');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedricin Muzik Odasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { margin: 0; font-family: 'Fredoka One', cursive; background: #F0FBFF; text-align: center; padding-bottom: 120px; overflow-x: hidden; }
        header { background: #4CC9F0; padding: 25px 20px; color: white; font-size: 22px; border-bottom: 6px solid #43B1D2; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        
        .oda-bilgi { color: #5BBAFF; font-size: 14px; margin-bottom: 10px; padding: 0 10px; }

        .calgi-izgara { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 15px; 
        }

        .calgi-kutu { 
            background: white; 
            border-radius: 25px; 
            padding: 20px 10px; 
            border: 4px solid #4CC9F0; 
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        .calgi-kutu:active { transform: scale(0.95); box-shadow: 0 2px 0 rgba(0,0,0,0.05); }

        .calgi-icon { font-size: 45px; color: #4CC9F0; margin-bottom: 10px; }
        .calgi-yazi { display: block; font-size: 14px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

        /* Uygulama içi ses barı tasarımı */
        .minik-calar { width: 100%; height: 30px; margin-top: 10px; border-radius: 10px; }

        /* Alt Navigasyon */
        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 50px; border: 4px solid #4CC9F0; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;}
        .nav-link { color: #4CC9F0; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

<header>🎹 CEDRICIN MUZIK ODASI 🎹</header>

<div class="oda-bilgi">ENSTRUMANLARA DOKUN VE SESINI DINLE</div>

<div class="calgi-izgara">
    
    <div class="calgi-kutu">
        <i class="fas fa-keyboard calgi-icon"></i>
        <span class="calgi-yazi">PIYANO</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/piano-melody-01.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calgi-kutu" style="border-color: #FF595E;">
        <i class="fas fa-guitar calgi-icon" style="color: #FF595E;"></i>
        <span class="calgi-yazi">GITAR</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/guitar-strum-01.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calgi-kutu" style="border-color: #FFCA3A;">
        <i class="fas fa-drum calgi-icon" style="color: #FFCA3A;"></i>
        <span class="calgi-yazi">DAVUL</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/drum-roll-01.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calgi-kutu" style="border-color: #A44CD3;">
        <i class="fas fa-trumpet calgi-icon" style="color: #A44CD3;"></i>
        <span class="calgi-yazi">TROMPET</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/trumpet-fanfare-01.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calgi-kutu" style="border-color: #66BB6A;">
        <i class="fas fa-bell calgi-icon" style="color: #66BB6A;"></i>
        <span class="calgi-yazi">ZIL</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="calgi-kutu" style="border-color: #F72585;">
        <i class="fas fa-bars calgi-icon" style="color: #F72585; transform: rotate(90deg);"></i>
        <span class="calgi-yazi">KSILOFON</span>
        <audio class="minik-calar" controls>
            <source src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>

</nav>

</body>
</html>
