<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedricin Muzik Odasi</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body { margin: 0; font-family: 'Fredoka One', cursive; background: #F0FBFF; text-align: center; padding-bottom: 120px; }
header { background: #4CC9F0; padding: 25px; color: white; font-size: 22px; border-bottom: 6px solid #43B1D2; border-radius: 0 0 30px 30px; }

.oda-bilgi { color: #5BBAFF; font-size: 14px; margin: 10px; }

.calgi-izgara { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }

.calgi-kutu {
    background: white;
    border-radius: 25px;
    padding: 15px;
    border: 4px solid #4CC9F0;
}

.calgi-icon { font-size: 40px; color: #4CC9F0; }

.calgi-yazi { display: block; font-size: 13px; margin-bottom: 10px; }

.pad button {
    margin: 3px;
    padding: 8px 10px;
    border-radius: 10px;
    border: none;
    background: #4CC9F0;
    color: white;
    cursor: pointer;
}

.pad button:active {
    transform: scale(0.9);
}

.candy-nav {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 15px;
    border-radius: 50px;
    border: 4px solid #4CC9F0;
}
.nav-link { color: #4CC9F0; font-size: 24px; }
</style>
</head>

<body>

<header>🎹 CEDRICIN MUZIK ODASI 🎹</header>
<div class="oda-bilgi">ENSTRÜMANLARA BAS VE ÇAL</div>

<div class="calgi-izgara">

<!-- PİYANO -->
<div class="calgi-kutu">
<i class="fas fa-keyboard calgi-icon"></i>
<span class="calgi-yazi">PIYANO</span>

<div class="pad">
<button onclick="nota(261)">DO</button>
<button onclick="nota(293)">RE</button>
<button onclick="nota(329)">MI</button>
<button onclick="nota(349)">FA</button>
</div>
</div>

<!-- DAVUL -->
<div class="calgi-kutu" style="border-color:#FFCA3A;">
<i class="fas fa-drum calgi-icon" style="color:#FFCA3A;"></i>
<span class="calgi-yazi">DAVUL</span>

<div class="pad">
<button onclick="davul()">BUM</button>
<button onclick="davul()">TAP</button>
</div>
</div>

<!-- GİTAR -->
<div class="calgi-kutu" style="border-color:#FF595E;">
<i class="fas fa-guitar calgi-icon" style="color:#FF595E;"></i>
<span class="calgi-yazi">GITAR</span>

<div class="pad">
<button onclick="nota(220)">TEL 1</button>
<button onclick="nota(247)">TEL 2</button>
</div>
</div>

<!-- ZİL -->
<div class="calgi-kutu" style="border-color:#66BB6A;">
<i class="fas fa-bell calgi-icon" style="color:#66BB6A;"></i>
<span class="calgi-yazi">ZIL</span>

<div class="pad">
<button onclick="zil()">ÇAL</button>
</div>
</div>

</div>

<nav class="candy-nav">
<a href="index.html" class="nav-link"><i class="fas fa-house"></i></a>
<a href="videolar.html" class="nav-link"><i class="fas fa-play"></i></a>
<a href="sarkilar.html" class="nav-link"><i class="fas fa-music"></i></a>
<a href="muzik-odasi.html" class="nav-link" style="color:#FFCA3A;"><i class="fas fa-guitar"></i></a>
</nav>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// Nota sesi
function nota(freq) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = freq;
    osc.type = "sine";

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);

    osc.stop(ctx.currentTime + 1);
}

// Davul sesi
function davul() {
    const bufferSize = ctx.sampleRate;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

    noise.connect(gain);
    gain.connect(ctx.destination);

    noise.start();
}

// Zil sesi
function zil() {
    nota(800);
    nota(1200);
}
</script>

</body>
</html>
