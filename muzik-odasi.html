<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedricin Muzik Odasi</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Fredoka One', cursive;
    background: #F0FBFF;
    text-align: center;
    padding-bottom: 120px;
    overflow-x: hidden;
}

header {
    background: #4CC9F0;
    padding: 25px;
    color: white;
    font-size: 22px;
    border-bottom: 6px solid #43B1D2;
    border-radius: 0 0 30px 30px;
}

.oda-bilgi {
    color: #5BBAFF;
    font-size: 14px;
    margin: 10px;
}

.calgi-izgara {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 15px;
}

.calgi-kutu {
    background: white;
    border-radius: 25px;
    padding: 15px;
    border: 4px solid #4CC9F0;
    transition: 0.1s;
}

.calgi-kutu:active {
    transform: scale(0.95);
    box-shadow: 0 0 25px rgba(76,201,240,0.4);
}

.calgi-icon {
    font-size: 40px;
    color: #4CC9F0;
}

.calgi-yazi {
    display: block;
    font-size: 13px;
    margin-bottom: 10px;
}

/* FX */
#fx {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: pop 0.6s ease-out forwards;
}

@keyframes pop {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(3); opacity: 0; }
}

/* NAV */
.candy-nav {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 15px;
    border-radius: 50px;
    border: 4px solid #4CC9F0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.nav-link {
    color: #4CC9F0;
    font-size: 24px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>🎹 CEDRICIN MUZIK ODASI 🎹</header>
<div class="oda-bilgi">ENSTRÜMANLARA BAS VE ÇAL 🎶</div>

<div class="calgi-izgara">

<div class="calgi-kutu">
<i class="fas fa-keyboard calgi-icon"></i>
<span class="calgi-yazi">PIYANO</span>
<div class="pad">
<button onclick="nota(261)">DO</button>
<button onclick="nota(293)">RE</button>
<button onclick="nota(329)">MI</button>
<button onclick="nota(349)">FA</button>
<button onclick="nota(392)">SOL</button>
<button onclick="nota(440)">LA</button>
<button onclick="nota(493)">SI</button>
</div>
</div>

<div class="calgi-kutu" style="border-color:#FFCA3A;">
<i class="fas fa-drum calgi-icon" style="color:#FFCA3A;"></i>
<span class="calgi-yazi">DAVUL</span>
<div class="pad">
<button onclick="kick()">KICK</button>
<button onclick="snare()">SNARE</button>
<button onclick="hihat()">HI-HAT</button>
</div>
</div>

<div class="calgi-kutu" style="border-color:#FF595E;">
<i class="fas fa-guitar calgi-icon" style="color:#FF595E;"></i>
<span class="calgi-yazi">GITAR</span>
<div class="pad">
<button onclick="gitar(220)">TEL 1</button>
<button onclick="gitar(247)">TEL 2</button>
<button onclick="gitar(262)">TEL 3</button>
</div>
</div>

<div class="calgi-kutu" style="border-color:#A44CD3;">
<i class="fas fa-trumpet calgi-icon" style="color:#A44CD3;"></i>
<span class="calgi-yazi">TROMPET</span>
<div class="pad">
<button onclick="trumpet(300)">ÇAL</button>
<button onclick="trumpet(500)">YÜKSEK</button>
</div>
</div>

</div>

<div id="fx"></div>

<!-- 🔥 NAV (DÜZELTİLDİ) -->
<nav class="candy-nav">

<a href="index.html" class="nav-link">
<i class="fas fa-house"></i>
</a>

<a href="videolar.html" class="nav-link">
<i class="fas fa-play"></i>
</a>

<a href="sarkilar.html" class="nav-link">
<i class="fas fa-music"></i>
</a>

<a href="muzik-odasi.html" class="nav-link" style="color:#FFCA3A;">
<i class="fas fa-guitar"></i>
</a>

</nav>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function efekt() {
    const fx = document.getElementById("fx");

    for (let i = 0; i < 8; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        p.style.left = Math.random() * window.innerWidth + "px";
        p.style.top = Math.random() * window.innerHeight + "px";
        p.style.background = ["#4CC9F0","#FFCA3A","#FF595E","#A44CD3"][Math.floor(Math.random()*4)];

        fx.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }
}

function nota(f) {
    efekt();
    let o = ctx.createOscillator();
    let g = ctx.createGain();

    o.type = "sine";
    o.frequency.value = f;

    o.connect(g);
    g.connect(ctx.destination);

    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
    o.stop(ctx.currentTime + 1);
}

function gitar(f){ nota(f); }
function trumpet(f){ nota(f*1.5); }
function kick(){ nota(90); }
function snare(){ nota(180); }
function hihat(){ nota(400); }
</script>

</body>
</html>
