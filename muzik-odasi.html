<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedricin Muzik Odasi</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body { margin: 0; font-family: 'Fredoka One', cursive; background: #F0FBFF; text-align: center; padding-bottom: 120px; }
header { background: #4CC9F0; padding: 25px; color: white; font-size: 22px; border-bottom: 6px solid #43B1D2; border-radius: 0 0 30px 30px; }

.oda-bilgi { color: #5BBAFF; font-size: 14px; margin: 10px; }

.calgi-izgara { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }

.calgi-kutu {
    background: white;
    border-radius: 25px;
    padding: 15px;
    border: 4px solid #4CC9F0;
}

.calgi-icon { font-size: 40px; color: #4CC9F0; }

.calgi-yazi { display: block; font-size: 13px; margin-bottom: 10px; }

.pad button {
    margin: 3px;
    padding: 8px 10px;
    border-radius: 10px;
    border: none;
    background: #4CC9F0;
    color: white;
    cursor: pointer;
}

.pad button:active {
    transform: scale(0.85);
}

.candy-nav {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 15px;
    border-radius: 50px;
    border: 4px solid #4CC9F0;
}
.nav-link { color: #4CC9F0; font-size: 24px; }
</style>
</head>

<body>

<header>🎹 CEDRICIN MUZIK ODASI 🎹</header>
<div class="oda-bilgi">ENSTRÜMANLARA BAS VE ÇAL 🎶</div>

<div class="calgi-izgara">

<!-- PİYANO -->
<div class="calgi-kutu">
<i class="fas fa-keyboard calgi-icon"></i>
<span class="calgi-yazi">PIYANO</span>
<div class="pad">
<button onclick="nota(261)">DO</button>
<button onclick="nota(293)">RE</button>
<button onclick="nota(329)">MI</button>
<button onclick="nota(349)">FA</button>
<button onclick="nota(392)">SOL</button>
<button onclick="nota(440)">LA</button>
<button onclick="nota(493)">SI</button>
</div>
</div>

<!-- DAVUL -->
<div class="calgi-kutu" style="border-color:#FFCA3A;">
<i class="fas fa-drum calgi-icon" style="color:#FFCA3A;"></i>
<span class="calgi-yazi">DAVUL</span>
<div class="pad">
<button onclick="kick()">KICK</button>
<button onclick="snare()">SNARE</button>
<button onclick="hihat()">HI-HAT</button>
</div>
</div>

<!-- GİTAR -->
<div class="calgi-kutu" style="border-color:#FF595E;">
<i class="fas fa-guitar calgi-icon" style="color:#FF595E;"></i>
<span class="calgi-yazi">GITAR</span>
<div class="pad">
<button onclick="gitar(220)">TEL 1</button>
<button onclick="gitar(247)">TEL 2</button>
<button onclick="gitar(262)">TEL 3</button>
</div>
</div>

<!-- TROMPET -->
<div class="calgi-kutu" style="border-color:#A44CD3;">
<i class="fas fa-trumpet calgi-icon" style="color:#A44CD3;"></i>
<span class="calgi-yazi">TROMPET</span>
<div class="pad">
<button onclick="trumpet(300)">ÇAL</button>
<button onclick="trumpet(500)">YÜKSEK</button>
</div>
</div>

<!-- 🔥 YENİ: SAX -->
<div class="calgi-kutu" style="border-color:#FF8C00;">
<i class="fas fa-music calgi-icon" style="color:#FF8C00;"></i>
<span class="calgi-yazi">SAKSAFON</span>
<div class="pad">
<button onclick="sax(300)">LOW</button>
<button onclick="sax(600)">HIGH</button>
</div>
</div>

<!-- 🔥 YENİ: KEMAN -->
<div class="calgi-kutu" style="border-color:#8A2BE2;">
<i class="fas fa-violin calgi-icon" style="color:#8A2BE2;"></i>
<span class="calgi-yazi">KEMAN</span>
<div class="pad">
<button onclick="keman(440)">NOTE</button>
<button onclick="keman(660)">HIGH</button>
</div>
</div>

<!-- 🔥 YENİ: BANJO -->
<div class="calgi-kutu" style="border-color:#DEB887;">
<i class="fas fa-guitar calgi-icon" style="color:#DEB887;"></i>
<span class="calgi-yazi">BANJO</span>
<div class="pad">
<button onclick="banjo(350)">TINK</button>
<button onclick="banjo(500)">PLINK</button>
</div>
</div>

<!-- 🔥 YENİ: SYNTH -->
<div class="calgi-kutu" style="border-color:#00CED1;">
<i class="fas fa-wave-square calgi-icon" style="color:#00CED1;"></i>
<span class="calgi-yazi">SYNTH</span>
<div class="pad">
<button onclick="synth(200)">SPACE</button>
<button onclick="synth(800)">LASER</button>
</div>
</div>

</div>

<nav class="candy-nav">
<a href="index.html" class="nav-link"><i class="fas fa-house"></i></a>
<a href="videolar.html" class="nav-link"><i class="fas fa-play"></i></a>
<a href="sarkilar.html" class="nav-link"><i class="fas fa-music"></i></a>
<a href="muzik-odasi.html" class="nav-link" style="color:#FFCA3A;"><i class="fas fa-guitar"></i></a>
</nav>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function nota(f) {
    let o = ctx.createOscillator();
    let g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = f;
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
    o.stop(ctx.currentTime + 1);
}

function gitar(f){nota(f);}

function trumpet(f){
    let o=ctx.createOscillator();
    o.type="sawtooth";
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.6);
}

function kick(){nota(90);}
function snare(){nota(180);}
function hihat(){nota(400);}

function sax(f){
    let o=ctx.createOscillator();
    o.type="triangle";
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.7);
}

function keman(f){
    let o=ctx.createOscillator();
    o.type="sine";
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+1);
}

function banjo(f){
    let o=ctx.createOscillator();
    o.type="square";
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.4);
}

function synth(f){
    let o=ctx.createOscillator();
    o.type="sawtooth";
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+1);
}
</script>

</body>
</html>
