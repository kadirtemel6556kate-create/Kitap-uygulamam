    <style>
        body {
            margin: 0;
            font-family: 'Fredoka One', cursive;
            background: #FFFDF0;
            text-align: center;
            padding-bottom: 120px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        header {
            background: #FF595E;
            padding: 25px 20px;
            color: white;
            font-size: 24px;
            border-bottom: 6px solid #D14045;
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
        }

        .sarki-kutusu {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sarki-item {
            background: white;
            border-radius: 25px;
            padding: 15px;
            border: 4px solid #FFCA3A;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
        }

        .sarki-adi {
            display: block;
            font-size: 18px;
            color: #444;
            margin-bottom: 15px;
            background: #FFCA3A;
            color: white;
            padding: 5px;
            border-radius: 10px;
        }

        /* YouTube Videosunu Pofuduk Yapan Kısım */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Alt Menü Navigasyonu */
        .candy-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #FF595E;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-link { color: #FF595E; font-size: 24px; text-decoration: none; }
        .active-nav { color: #FFCA3A; }
    </style>
