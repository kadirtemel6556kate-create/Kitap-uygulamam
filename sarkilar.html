<head>

    <meta charset="UTF-8">

    <title>Cedric ile Çocuk Şarkıları</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Fredoka One', cursive;
            background: #FFFDF0; /* O meşhur krem/beyaz arka plan */
            text-align: center;
            padding-bottom: 100px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        header {
            background: #A44CD3; /* Şarkı sayfası için tatlı bir mor */
            padding: 20px;
            color: white;
            font-size: 22px;
            border-bottom: 6px solid #8E3BB8;
            border-radius: 0 0 20px 20px;
        }

        .sarki-listesi {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        .sarki-kart {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 4px solid #eee;
            box-shadow: 0 5px 0 rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .sarki-kart:active { transform: scale(0.95); }

        .sarki-icon {
            width: 50px;
            height: 50px;
            background: #FFCA3A;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .sarki-bilgi { text-align: left; }
        .sarki-adi { display: block; font-size: 16px; color: #555; }
        .oynat-yazi { font-size: 12px; color: #A44CD3; }

        /* Alt Menü (Hepsinde Aynı) */
        .candy-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #A44CD3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-link { color: #A44CD3; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

<header>🎵 Cedric Şarkı Söylüyor 🎵</header>

<div class="sarki-listesi">
    <a href="https://www.youtube.com/watch?v=VİDEO_İD_BURAYA" class="sarki-kart" style="border-color: #FF595E;">
        <div class="sarki-icon" style="background: #FF595E;"><i class="fas fa-music"></i></div>
        <div class="sarki-bilgi">
            <span class="sarki-adi">Kırmızı Balık</span>
            <span class="oynat-yazi">Hemen Dinle →</span>
        </div>
    </a>

    <a href="#" class="sarki-kart" style="border-color: #1982C4;">
        <div class="sarki-icon" style="background: #1982C4;"><i class="fas fa-play"></i></div>
        <div class="sarki-bilgi">
            <span class="sarki-adi">Ali Babanın Çiftliği</span>
            <span class="oynat-yazi">Hemen Dinle →</span>
        </div>
    </a>

    <a href="#" class="sarki-kart" style="border-color: #66BB6A;">
        <div class="sarki-icon" style="background: #66BB6A;"><i class="fas fa-star"></i></div>
        <div class="sarki-bilgi">
            <span class="sarki-adi">Küçük Kurbağa</span>
            <span class="oynat-yazi">Hemen Dinle →</span>
        </div>
    </a>
</div>

</html>
