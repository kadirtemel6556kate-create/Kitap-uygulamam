<head>

    <meta charset="UTF-8">

    <title>Cedric Müzik Kutusu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Fredoka One', cursive;
            background: #FFFDF0;
            text-align: center;
            padding-bottom: 120px;
        }

        header {
            background: #FF595E;
            padding: 25px 20px;
            color: white;
            font-size: 24px;
            border-bottom: 6px solid #D14045;
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
        }

        .sarki-listesi { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        .sarki-kart {
            background: white;
            border-radius: 25px;
            padding: 15px;
            border: 4px solid #1982C4;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .sarki-adi {
            display: block;
            font-size: 18px;
            color: white;
            margin-bottom: 10px;
            background: #1982C4;
            padding: 8px;
            border-radius: 15px;
        }

        /* YouTube oynatıcısını MP3 çalar gibi incecik yapan sihirli ayar */
        .muzik-calar {
            width: 100%;
            height: 60px; /* Sadece kontrol çubuğu görünecek kadar dar */
            border-radius: 15px;
            overflow: hidden;
        }

        .muzik-calar iframe {
            width: 100%;
            height: 300px; /* Videoyu aşağıda bırakıyoruz */
            margin-top: -120px; /* Videonun üst kısmını gizleyip sadece barı bırakıyoruz */
            border: none;
        }

        /* Navigasyon */
        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 50px; border: 4px solid #FF595E;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-link { color: #FF595E; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

<header>🎵 Cedric'in Müzik Listesi 🎵</header>

<div class="sarki-listesi">
    
    <div class="sarki-kart" style="border-color: #FFCA3A;">
        <span class="sarki-adi" style="background: #FFCA3A;">📯 Bak Postacı Geliyor</span>
        <div class="muzik-calar">
            <iframe src="https://www.youtube.com/embed/Pet2UbL966g?controls=1&showinfo=0&rel=0" allowfullscreen></iframe>
        </div>
    </div>

</div>
