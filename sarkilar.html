    <style>
        body {
            margin: 0;
            font-family: 'Fredoka One', cursive;
            background: #FFFDF0;
            text-align: center;
            padding-bottom: 110px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        header {
            background: #A44CD3;
            padding: 25px 20px;
            color: white;
            font-size: 24px;
            border-bottom: 6px solid #8E3BB8;
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .sarki-listesi {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 20px;
        }

        .sarki-kart {
            background: white;
            border-radius: 25px;
            padding: 18px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 4px solid #eee;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .sarki-kart:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.05);
        }

        .sarki-icon {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            flex-shrink: 0;
        }

        .sarki-bilgi {
            text-align: left;
        }

        .sarki-adi {
            display: block;
            font-size: 18px;
            color: #444;
            margin-bottom: 4px;
        }

        .oynat-yazi {
            font-size: 13px;
            color: #888;
            font-weight: bold;
        }

        /* Alt Menü Navigasyonu */
        .candy-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #A44CD3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-link {
            color: #A44CD3;
            font-size: 24px;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .nav-link:active {
            transform: scale(1.2);
        }

        .active-nav {
            color: #FFCA3A;
        }
    </style>
</head>
<body>

<header>🎵 Çocuk Şarkıları 🎵</header>

<div class="sarki-listesi">

        <div class="sarki-icon" style="background: #66BB6A;">
            <i class="fas fa-cow"></i>
        </div>
        <div class="sarki-bilgi">
            <span class="sarki-adi">Ali Baba'nın Çiftliği</span>
            <span class="oynat-yazi" style="color: #66BB6A;">Hemen Dinle →</span>
        </div>
    </a>
