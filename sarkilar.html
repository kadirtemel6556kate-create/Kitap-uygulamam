    <style>
        body {

            text-align: center;

        .sarki-listesi { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        }

        /* YouTube'u sadece ses barı yapan sihirli kutu */
        .ses-oynatici {
            width: 100%;
            height: 65px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: #66BB6A; /* Yeşil pofuduk arka plan */
        }

        .ses-oynatici iframe {
            width: 100%;
            height: 400px;
            margin-top: -150px; /* Videoyu yukarı itip sadece barı bırakıyoruz */
            border: none;
        }

        /* Navigasyon */

            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
