<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oyun Bahçesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pembe: #FF85A2;
            --mavi: #4ECDC4;
            --sari: #FFE66D;
            --mor: #A29BFE;
            --arka-plan: #F0F4F8;
        }

        body { 
            margin: 0; 
            background: var(--arka-plan);
            font-family: 'Fredoka One', cursive;
            color: #444;
            padding-bottom: 120px;
            text-align: center;
        }

        header {
            background: white;
            padding: 30px 20px;
            border-bottom: 6px solid var(--pembe);
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; font-size: 28px; color: var(--pembe); }

        /* Oyun Seçim Alanı */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 25px;
        }

        .game-card {
            background: white;
            border-radius: 35px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 10px 0 #DDE4F0;
            transition: 0.2s;
            border: 4px solid transparent;
        }

        .game-card:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #DDE4F0;
        }

        .game-card i { font-size: 50px; margin-bottom: 10px; }
        .game-card span { font-size: 16px; color: #555; }

        /* Oyun Renkleri */
        .g-hafiza { border-color: var(--mavi); color: var(--mavi); }
        .g-balon { border-color: var(--pembe); color: var(--pembe); }
        .g-xox { border-color: var(--sari); color: var(--sari); }
        .g-surpriz { border-color: var(--mor); color: var(--mor); }

        /* Oyun Sahnesi (Gizli Başlar) */
        #gameStage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 40px; color: var(--pembe);
            cursor: pointer;
        }

        /* Alt Navigasyon (Anasayfa ile aynı) */
        .candy-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 40px;
            border: 4px solid var(--mavi);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-link { text-align: center; color: #BBB; text-decoration: none; }
        .nav-link i { font-size: 26px; }
        .nav-link.active { color: #FF00EA; transform: scale(1.2); }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Oyun Dünyası</h1>
    </header>

    <div class="game-grid">
        <a href="#" class="game-card g-hafiza" onclick="oyunAc('hafiza')">
            <i class="fas fa-brain"></i>
            <span>Hafıza Kartları</span>
        </a>

        <a href="#" class="game-card g-balon" onclick="oyunAc('balon')">
            <i class="fas fa-apple-alt"></i>
            <span>Meyve Topla</span>
        </a>

        <a href="#" class="game-card g-xox" onclick="oyunAc('xox')">
            <i class="fas fa-times-circle"></i>
            <span>Sosy (XOX)</span>
        </a>

        <a href="#" class="game-card g-surpriz">
            <i class="fas fa-gift"></i>
            <span>Yeni Oyun!</span>
        </a>
    </div>

    <div id="gameStage">
        <span class="close-btn" onclick="oyunKapat()"><i class="fas fa-times-circle"></i></span>
        <h2 id="gameTitle" style="color: var(--mavi);">Oyun Başlıyor</h2>
        <div id="gameContent">
            </div>
    </div>

    <nav class="candy-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
        <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open-reader"></i></a>
        <a href="videolar.html" class="nav-link"><i class="fas fa-circle-play"></i></a>
        <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-high"></i></a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-wand-magic-sparkles"></i></a>
        <a href="oyunlar.html" class="nav-link active"><i class="fas fa-gamepad"></i></a>
    </nav>

    <script>
        function oyunAc(tip) {
            const stage = document.getElementById('gameStage');
            const content = document.getElementById('gameContent');
            const title = document.getElementById('gameTitle');
            
            stage.style.display = "flex";
            content.innerHTML = "";

            if(tip === 'hafiza') {
                title.innerText = "Kartları Eşleştir!";
                content.innerHTML = "<p style='font-size:20px; padding:20px;'>Eski hafıza oyunu kodlarını buraya entegre edebilirsin Kadir! 🌟</p>";
            } else if(tip === 'balon') {
                title.innerText = "Meyveleri Yakala!";
                content.innerHTML = "<div style='width:300px; height:300px; background:#f0f0f0; border-radius:20px; display:flex; align-items:center; justify-content:center;'>🍎 🍐 🍊<br>Çok Yakında!</div>";
            } else if(tip === 'xox') {
                title.innerText = "X vs O Savaşı!";
                content.innerHTML = "<p style='font-size:20px;'>Arkadaşınla oyna!</p>";
            }
        }

        function oyunKapat() {
            document.getElementById('gameStage').style.display = "none";
        }
    </script>

</body>
</html>
