<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cedric'in Oyun Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --mor: #A29BFE; --pembe: #FF85A2; --arka-plan: #F0F4F8; }
        body { margin: 0; background: var(--arka-plan); font-family: 'Fredoka One', cursive; text-align: center; padding-bottom: 120px; }
        header { background: white; padding: 25px; border-bottom: 6px solid var(--mor); border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .game-card { background: white; border-radius: 30px; padding: 20px; border: 4px solid var(--mor); box-shadow: 0 8px 0 #D1C9FF; text-decoration: none; color: var(--mor); }
        #gameStage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; }
        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 40px; border: 4px solid var(--mor); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-link { color: #BBB; font-size: 24px; }
        .active { color: var(--mor); }
    </style>
</head>
<body>
    <header><h1>🎮 Oyun Dünyası</h1></header>
    <div class="game-grid">
        <div class="game-card" onclick="baslatHafiza()"><i class="fas fa-th-large" style="font-size:40px;"></i><br>Hafıza</div>
        <div class="game-card" onclick="baslatBalon()"><i class="fas fa-popelease" style="font-size:40px;"></i><br>Balon</div>
    </div>
    <div id="gameStage">
        <div onclick="oyunKapat()" style="padding:20px; font-size:30px; color:red; text-align:right;">✖️</div>
        <div id="gameContainer" style="flex:1; position:relative;"></div>
    </div>
    <nav class="candy-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
        <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
        <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
        <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-up"></i></a>
        <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
        <a href="oyunlar.html" class="nav-link active"><i class="fas fa-gamepad"></i></a>
    </nav>
    <script>
        const stage = document.getElementById('gameStage'); const container = document.getElementById('gameContainer');
        function oyunKapat() { stage.style.display='none'; container.innerHTML=''; }
        function baslatHafiza() { stage.style.display='flex'; container.innerHTML='<h2 style="color:var(--mor)">Eşini Bul!</h2>'; /* Hafıza kodları buraya */ }
        function baslatBalon() { stage.style.display='flex'; container.innerHTML='<h2 style="color:var(--mor)">Balon Patlat!</h2>'; /* Balon kodları buraya */ }
    </script>
</body>
</html>
