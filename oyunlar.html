<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oyun Bahçesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pembe: #FF85A2; --mavi: #4ECDC4; --sari: #FFE66D; --mor: #A29BFE; --arka-plan: #F0F4F8; }
        body { margin: 0; background: var(--arka-plan); font-family: 'Fredoka One', cursive; color: #444; padding-bottom: 120px; text-align: center; overflow-x: hidden; }
        
        header { background: white; padding: 25px; border-bottom: 6px solid var(--pembe); border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        h1 { margin: 0; font-size: 24px; color: var(--pembe); }

        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .game-card { background: white; border-radius: 30px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-decoration: none; box-shadow: 0 8px 0 #DDE4F0; border: 4px solid transparent; transition: 0.2s; }
        .game-card:active { transform: translateY(4px); box-shadow: 0 4px 0 #DDE4F0; }
        .game-card i { font-size: 45px; margin-bottom: 10px; }
        .g-hafiza { border-color: var(--mavi); color: var(--mavi); }
        .g-balon { border-color: var(--pembe); color: var(--pembe); }

        /* OYUN SAHNESİ */
        #gameStage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; align-items: center; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 35px; color: var(--pembe); z-index: 2100; }
        #gameContainer { width: 100%; height: 100%; position: relative; overflow: hidden; }

        /* HAFIZA OYUNU STİLLERİ */
        .memory-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 400px; margin: auto; }
        .card { height: 90px; background: #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; transform-style: preserve-3d; transition: 0.5s; border: 3px solid #ddd; }
        .card.flipped { transform: rotateY(180deg); background: white; border-color: var(--mavi); }
        .card i { display: none; }
        .card.flipped i { display: block; transform: rotateY(180deg); }

        /* BALON OYUNU STİLLERİ */
        .balloon { position: absolute; width: 70px; height: 90px; border-radius: 50%; cursor: pointer; animation: fly 4s linear; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        @keyframes fly { from { bottom: -100px; } to { bottom: 110%; } }

        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 40px; border: 4px solid var(--mavi); box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: #FF00EA; }
    </style>
</head>
<body>

<header><h1>🎮 Oyun Dünyası</h1></header>

<div class="game-grid">
    <div class="game-card g-hafiza" onclick="baslatHafiza()">
        <i class="fas fa-th-large"></i>
        <span>Hafıza Kartı</span>
    </div>
    <div class="game-card g-balon" onclick="baslatBalon()">
        <i class="fas fa-popelease"></i>
        <span>Balon Patlat</span>
    </div>
</div>

<div id="gameStage">
    <span class="close-btn" onclick="oyunKapat()"><i class="fas fa-times-circle"></i></span>
    <h2 id="gameTitle" style="margin-top:20px; color: var(--mavi);">Oyun</h2>
    <div id="gameContainer"></div>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open-reader"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-circle-play"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-high"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-wand-magic-sparkles"></i></a>
    <a href="oyunlar.html" class="nav-link active"><i class="fas fa-gamepad"></i></a>
</nav>

<script>
    const container = document.getElementById('gameContainer');
    const stage = document.getElementById('gameStage');
    const title = document.getElementById('gameTitle');
    let gameTimer;

    function oyunKapat() {
        stage.style.display = "none";
        container.innerHTML = "";
        clearInterval(gameTimer);
    }

    // --- HAFIZA OYUNU ---
    function baslatHafiza() {
        stage.style.display = "flex";
        title.innerText = "Kartları Eşleştir!";
        container.innerHTML = '<div class="memory-board" id="board"></div>';
        const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊'];
        let cards = [...icons, ...icons].sort(() => Math.random() - 0.5);
        let flipped = [];
        
        const board = document.getElementById('board');
        cards.forEach((emoji, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = emoji;
            card.innerHTML = `<i>${emoji}</i>`;
            card.onclick = function() {
                if(flipped.length < 2 && !this.classList.contains('flipped')) {
                    this.classList.add('flipped');
                    flipped.push(this);
                    if(flipped.length === 2) {
                        if(flipped[0].dataset.val === flipped[1].dataset.val) {
                            flipped = [];
                        } else {
                            setTimeout(() => {
                                flipped.forEach(c => c.classList.remove('flipped'));
                                flipped = [];
                            }, 800);
                        }
                    }
                }
            };
            board.appendChild(card);
        });
    }

    // --- BALON PATLATMA ---
    function baslatBalon() {
        stage.style.display = "flex";
        title.innerText = "Balonları Patlat!";
        container.innerHTML = '<div style="padding:10px;">Puan: <span id="score">0</span></div>';
        let score = 0;
        
        gameTimer = setInterval(() => {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * (window.innerWidth - 70) + 'px';
            balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 70%)`;
            balloon.innerHTML = "🎈";
            balloon.onclick = function() {
                score++;
                document.getElementById('score').innerText = score;
                this.remove();
            };
            container.appendChild(balloon);
            setTimeout(() => balloon.remove(), 4000);
        }, 800);
    }
</script>

</body>
</html>
