<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Kitaplik</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --kapak-kirmizi: #FF595E;
            --kapak-mavi: #1982C4;
            --kapak-mor: #6A4C93;
            --kapak-turuncu: #FF924C;
            --arka-plan: #FDF0D5;
        }

        body { 
            margin: 0; 
            background: var(--arka-plan);
            font-family: 'Fredoka One', cursive;
            padding-bottom: 120px;
        }

        header {
            background: #764134; 
            padding: 30px;
            text-align: center;
            border-bottom: 10px solid #5d3329;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 26px; color: #FFF; text-shadow: 2px 2px #333; }

        .bookshelf {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 25px;
        }

        .book {
            background: white;
            height: 200px;
            border-radius: 15px 30px 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            box-shadow: 5px 10px 0 rgba(0,0,0,0.1);
            transition: 0.3s;
            border-left: 12px solid rgba(0,0,0,0.2);
        }

        .book:active { transform: scale(0.95); }

        .book i {
            font-size: 50px;
            margin-bottom: 15px;
            color: white;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
        }

        .book span {
            color: white;
            font-size: 16px;
            text-align: center;
            padding: 0 10px;
            line-height: 1.2;
        }

        .b-red { background: var(--kapak-kirmizi); }
        .b-blue { background: var(--kapak-mavi); }
        .b-purple { background: var(--kapak-mor); }
        .b-orange { background: var(--kapak-turuncu); }

        .candy-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 40px;
            border: 4px solid var(--kapak-kirmizi);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--kapak-kirmizi); }
    </style>
</head>
<body>

    <header>
        <h1>Sihirli Kitaplik</h1>
    </header>

    <div class="bookshelf">
        <a href="masal1.html" class="book b-red">
            <i class="fas fa-rabbit"></i>
            <span>Tavsan ve Kaplumbaga</span>
        </a>

        <a href="masal2.html" class="book b-blue">
            <i class="fas fa-cloud-moon"></i>
            <span>Uykucu Bulut</span>
        </a>

        <a href="masal3.html" class="book b-purple">
            <i class="fas fa-wand-magic"></i>
            <span>Sihirli Degnek</span>
        </a>

        <a href="masal4.html" class="book b-orange">
            <i class="fas fa-cat"></i>
            <span>Yavru Kedi</span>
        </a>
    </div>

    <nav class="candy-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
        <a href="hikayeler.html" class="nav-link active"><i class="fas fa-book-open"></i></a>
        <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
        <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-up"></i></a>
        <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
        <a href="oyunlar.html" class="nav-link"><i class="fas fa-ghost"></i></a>
    </nav>

</body>
</html>
