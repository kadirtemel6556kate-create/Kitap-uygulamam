<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikayeler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding-bottom: 120px; }
        header { padding: 25px 20px; background: #111; border-bottom: 1px solid #222; text-align: center; }
        h1 { color: #1DB954; font-size: 24px; }
        .content { padding: 20px; }
        
        /* Liste Tasarımı */
        .story-item {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            cursor: pointer;
            border-left: 5px solid #1db954;
            transition: 0.3s;
        }
        .story-item:active { background: #282828; transform: scale(0.98); }
        .ok { color: #1db954; font-weight: bold; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 1px solid #282828; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #b3b3b3; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: #fff; }

        /* PARLAYAN OYUNLAR BUTONU CSS */
        .game-btn {
            background: linear-gradient(45deg, #ff00ea, #ffcc00, #00ffcc);
            background-size: 200% 200%;
            border-radius: 12px;
            margin: 5px;
            color: #fff !important;
            animation: rainbow 3s ease infinite, pulse 1.5s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .game-btn i { color: #fff !important; }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Modal Tasarımı */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; }
        .modal-box { background:#121212; margin:15% auto; padding:20px; width:85%; border-radius:15px; border:1px solid #1db954; color:white; max-height:70vh; overflow-y:auto; position: relative; }
    </style>
</head>
<body>
    <header><h1>📖 Yazılı Hikayeler</h1></header>
    
    <div class="content">
        <div class="story-list">
            <div class="story-item" onclick="hikayeAc('Kırmızı Başlıklı Kız', 'Bir varmış bir yokmuş... Evvel zaman içinde, kalbur saman içinde; ormanın derinliklerinde annesiyle yaşayan dünya tatlısı bir kız varmış. Bir gün büyükannesine kurabiye götürürken yolda kurnaz bir kurtla karşılaşmış...')">
                <span>Kırmızı Başlıklı Kız</span>
                <span class="ok">→</span>
            </div>

            <div class="story-item" onclick="hikayeAc('Aslan ile Fare', 'Ormanlar kralı aslan, bir gün ağaç gölgesinde uyurken küçük bir fare üzerinden geçmiş. Aslan sinirlenmiş ama fare yalvarmış: Beni bırak, belki bir gün işine yararım. Aslan gülmüş ve fareyi bırakmış. Gün gelmiş, aslan avcıların ağına düşmüş ve fare gelip ağı kemirerek kralı kurtarmış.')">
                <span>Aslan ile Fare</span>
                <span class="ok">→</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Anasayfa</a>
        <a href="hikayeler.html" class="nav-item active"><i class="fas fa-book-open"></i>Hikayeler</a>
        <a href="videolar.html" class="nav-item"><i class="fas fa-video"></i>Videolar</a>
        <a href="sesli-kitaplar.html" class="nav-item"><i class="fas fa-headphones"></i>Dinle</a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-paint-brush"></i>Boyama</a>
        <a href="oyunlar.html" class="nav-item game-btn"><i class="fas fa-gamepad"></i>Oyunlar</a>
    </div>

    <div id="storyModal" class="modal">
        <div class="modal-box">
            <span onclick="hikayeKapat()" style="float:right; font-size:30px; color:#1db954; cursor:pointer;">&times;</span>
            <h2 id="modalTitle" style="color:#1db954; margin-top: 0;"></h2>
            <hr style="border:0.5px solid #333; margin: 15px 0;">
            <p id="modalBody" style="line-height:1.6; font-size:16px;"></p>
        </div>
    </div>

    <script>
    function hikayeAc(baslik, metin) {
        document.getElementById('modalTitle').innerText = baslik;
        document.getElementById('modalBody').innerText = metin;
        document.getElementById('storyModal').style.display = "block";
    }

    function hikayeKapat() {
        document.getElementById('storyModal').style.display = "none";
    }
    </script>
</body>
</html>
