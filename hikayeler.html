<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masal Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --elma: #FF595E; --arka-plan: #FFF5F5; }
        body { margin: 0; background: var(--arka-plan); font-family: 'Fredoka One', cursive; color: #444; padding-bottom: 120px; }
        header { background: white; padding: 25px; border-bottom: 6px solid var(--elma); border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; text-align: center; }
        h1 { margin: 0; font-size: 24px; color: var(--elma); }

        .list { padding: 20px; display: grid; gap: 15px; }
        .card { background: white; border-radius: 30px; padding: 20px; display: flex; align-items: center; text-decoration: none; border: 4px solid var(--elma); box-shadow: 0 8px 0 #FFD8D9; transition: 0.2s; }
        .card:active { transform: translateY(4px); box-shadow: 0 4px 0 #FFD8D9; }
        .card i { font-size: 45px; color: var(--elma); margin-right: 20px; }
        .card span { font-size: 20px; color: #555; }

        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 40px; border: 4px solid var(--elma); box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--elma); }
    </style>
</head>
<body>

<header><h1>📖 Masal Oku</h1></header>

<div class="list">
    <a href="masal1.html" class="card">
        <i class="fas fa-rabbit"></i>
        <span>Tavşan ile Kaplumbağa</span>
    </a>
    <a href="masal2.html" class="card">
        <i class="fas fa-hat-wizard"></i>
        <span>Sihirli Orman</span>
    </a>
    <a href="masal3.html" class="card">
        <i class="fas fa-dragon"></i>
        <span>Yavru Ejderha</span>
    </a>
    <a href="masal4.html" class="card">
        <i class="fas fa-star"></i>
        <span>Yıldızın Hikayesi</span>
    </a>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link active"><i class="fas fa-book-open"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-up"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
    <a href="oyunlar.html" class="nav-link"><i class="fas fa-gamepad"></i></a>
</nav>

</body>
</html>
