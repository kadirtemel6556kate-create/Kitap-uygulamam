<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Dunya</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --ana-renk: #FF595E; --arka: #FFFDF0; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; }
        header { background: var(--ana-renk); padding: 30px; text-align: center; border-bottom: 8px solid #D6454B; }
        h1 { margin: 0; color: white; font-size: 24px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; }
        .menu-card { 
            background: white; border-radius: 35px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; border: 5px solid var(--ana-renk); 
            box-shadow: 0 10px 0 rgba(255, 89, 94, 0.2); transition: 0.2s;
        }
        .menu-card:active { transform: translateY(5px); box-shadow: 0 4px 0 rgba(255, 89, 94, 0.2); }
        .menu-card i { font-size: 45px; color: var(--ana-renk); margin-bottom: 15px; }
        .menu-card span { font-size: 16px; color: #444; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--ana-renk);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--ana-renk); }
    </style>
</head>

    <a href="oyunlar.html" class="menu-card"><i class="fas fa-ghost"></i><span>Oyunlar</span></a>
