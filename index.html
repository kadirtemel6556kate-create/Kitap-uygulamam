<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cedric'in Oyun Parkı</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bulut: #FFFFFF;
            --gokyuzu: #87CEEB;
            --gunes: #FFD700;
            --elma: #FF595E;
            --limon: #FFCA3A;
            --nane: #8AC926;
            --deniz: #1982C4;
        }

        body { 
            margin: 0; 
            background: var(--gokyuzu);
            font-family: 'Fredoka One', cursive;
            color: #333;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        header {
            background: var(--bulut);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 8px solid var(--gunes);
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }

        .face-avatar {
            font-size: 70px;
            display: block;
            margin-bottom: 10px;
            animation: wiggle 2s infinite ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        h1 { margin: 0; font-size: 28px; color: var(--deniz); }

        .playground {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 30px 20px;
        }

        .toy-btn {
            background: var(--bulut);
            border-radius: 40px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 12px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 6px solid;
        }

        .toy-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .toy-btn i { font-size: 50px; margin-bottom: 15px; }
        .toy-btn span { font-size: 18px; font-weight: bold; }

        .btn-red { border-color: var(--elma); color: var(--elma); }
        .btn-blue { border-color: var(--deniz); color: var(--deniz); }
        .btn-yellow { border-color: var(--limon); color: var(--limon); }
        .btn-green { border-color: var(--nane); color: var(--nane); }

        .btn-game-world {
            grid-column: span 2;
            background: linear-gradient(135deg, #FF00EA, #7000FF);
            border: 6px solid #FFF;
            box-shadow: 0 12px 0 #5000B8;
        }
        .btn-game-world i, .btn-game-world span { color: white !important; }

        .candy-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 40px;
            border: 4px solid var(--deniz);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .nav-link.active { color: var(--elma); }
    </style>
</head>
<body>

    <header>
        <span class="face-avatar">🥳</span>
        <h1>Sihirli Parka Hoş Geldin!</h1>
    </header>

    <div class="playground">
        <a href="hikayeler.html" class="toy-btn btn-red">
            <i class="fas fa-book-open-reader"></i>
            <span>Masal Oku</span>
        </a>

        <a href="videolar.html" class="toy-btn btn-blue">
            <i class="fas fa-tv"></i>
            <span>Çizgi Film</span>
        </a>

        <a href="sesli-kitaplar.html" class="toy-btn btn-yellow">
            <i class="fas fa-headphones-alt"></i>
            <span>Masal Dinle</span>
        </a>

        <a href="boyama.html" class="toy-btn btn-green">
            <i class="fas fa-paint-brush"></i>
            <span>Boyama Yap</span>
        </a>
        
        <a href="oyunlar.html" class="toy-btn btn-game-world">
            <i class="fas fa-gamepad"></i>
            <span style="font-size: 24px;">OYUN DÜNYASI</span>
        </a>
    </div>

    <nav class="candy-nav">
        <a href="index.html" class="nav-link active"><i class="fas fa-house-chimney"></i></a>
        <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
        <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
        <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-up"></i></a>
        <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
        <a href="oyunlar.html" class="nav-link"><i class="fas fa-ghost"></i></a>
    </nav>

</body>
</html>
