<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cedric'in Sihirli Dünyası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ana-renk: #FF6B6B;
            --mavi: #4ECDC4;
            --sari: #FFE66D;
            --pembe: #FF85A2;
            --yesil: #77DD77;
            --arka-plan: #F0F4F8;
        }

        body { 
            margin: 0; 
            background: var(--arka-plan);
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            color: #444;
            padding-bottom: 110px;
            overflow-x: hidden;
        }

        /* Gökkuşağı Üst Başlık */
        header {
            background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .avatar-box {
            width: 80px; height: 80px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: hopla 2s infinite ease-in-out;
        }

        @keyframes hopla {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { margin: 0; font-size: 22px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        /* Pofuduk Menü Kartları */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: 10px;
        }

        .kids-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 10px 0 #E0E7FF; /* Pofuduk gölge efekti */
            transition: all 0.2s;
            border: 3px solid transparent;
        }

        .kids-card:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #E0E7FF;
        }

        .kids-card i { font-size: 45px; margin-bottom: 10px; }
        .kids-card span { font-weight: bold; font-size: 15px; color: #555; }

        /* Kart Renkleri */
        .c-kitap { border-color: var(--ana-renk); color: var(--ana-renk); }
        .c-video { border-color: var(--mavi); color: var(--mavi); }
        .c-sesli { border-color: var(--sari); color: var(--sari); }
        .c-boya { border-color: var(--pembe); color: var(--pembe); }

        /* Dev Oyun Butonu (Hazine Sandığı) */
        .kids-card-full {
            grid-column: span 2;
            background: linear-gradient(45deg, #FFD93D, #FF8400);
            border: none;
            box-shadow: 0 10px 0 #CC6600;
        }
        .kids-card-full i, .kids-card-full span { color: white !important; }

        /* Alt Navigasyon (Balon Menü) */
        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #BBB;
            text-decoration: none;
            font-size: 10px;
            transition: 0.3s;
        }

        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--ana-renk); transform: scale(1.1); }

        /* Parlayan Oyun İkonu */
        .nav-oyun {
            background: linear-gradient(45deg, #FF00EA, #00FFCC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: parla 1.5s infinite;
        }

        @keyframes parla {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar-box">🐾</div>
        <h1>Hoş Geldin Küçük Kahraman!</h1>
    </header>

    <div class="grid-container">
        <a href="hikayeler.html" class="kids-card c-kitap">
            <i class="fas fa-book-reader"></i>
            <span>Masal Oku</span>
        </a>
        <a href="videolar.html" class="kids-card c-video">
            <i class="fas fa-tv"></i>
            <span>Masal İzle</span>
        </a>
        <a href="sesli-kitaplar.html" class="kids-card c-sesli">
            <i class="fas fa-music"></i>
            <span>Masal Dinle</span>
        </a>
        <a href="boyama.html" class="kids-card c-boya">
            <i class="fas fa-palette"></i>
            <span>Boyama Yap</span>
        </a>
        <a href="oyunlar.html" class="kids-card kids-card-full">
            <i class="fas fa-gem"></i>
            <span style="font-size: 18px;">OYUN DÜNYASINA GİR!</span>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Evim</a>
        <a href="hikayeler.html" class="nav-item"><i class="fas fa-book-open"></i>Oku</a>
        <a href="videolar.html" class="nav-item"><i class="fas fa-play-circle"></i>İzle</a>
        <a href="sesli-kitaplar.html" class="nav-item"><i class="fas fa-headphones"></i>Dinle</a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-paint-brush"></i>Boya</a>
        <a href="oyunlar.html" class="nav-item"><i class="fas fa-gamepad nav-oyun"></i>Oyun</a>
    </div>

</body>
</html>
