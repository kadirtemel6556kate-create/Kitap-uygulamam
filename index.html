<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kitap Dünyam</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background: linear-gradient(to bottom, #e0f7fa, #fff3e0); 
            color: #333;
        }
        header { 
            background: linear-gradient(135deg, #4CAF50, #2196F3); 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { margin: 0; font-size: 1.8em; }
        input { 
            width: 90%; 
            padding: 15px; 
            margin: 15px auto; 
            display: block; 
            border-radius: 25px; 
            border: none; 
            font-size: 1.1em;
        }
        .tabs { text-align: center; margin: 10px 0; }
        button { 
            padding: 12px 18px; 
            margin: 5px; 
            border: none; 
            border-radius: 20px; 
            background: #4CAF50; 
            color: white; 
            font-size: 1em;
        }
        .card { 
            background: white; 
            margin: 12px; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        audio { width: 100%; margin: 10px 0; }
        .tab { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <header>
        <h1>📚 Kitap Dünyam</h1>
        <p>Yaşa Göre Masallar, Hikayeler ve Sesli Kitaplar</p>
    </header>

    <input type="text" id="searchInput" placeholder="🔍 Masal veya hikaye ara..." onkeyup="searchContent()">

    <div class="tabs">
        <button onclick="openTab('cocuk06')">0-6 Yaş Masallar</button>
        <button onclick="openTab('cocuk712')">7-12 Yaş Hikayeler</button>
        <button onclick="openTab('yetiskin')">Yetişkinler</button>
    </div>

    <!-- 0-6 Yaş -->
    <div id="cocuk06" class="tab active">
        <h2 style="text-align:center; color:#4CAF50;">🐰 0-6 Yaş Masallar</h2>
        <div class="card">
            <h3>1. Kırmızı Başlıklı Kız</h3>
            <audio controls><source src="https://archive.org/download/childrens-short-works-056/kirmizi_baslikli_kiz.mp3" type="audio/mpeg"></audio>
            <p><a href="https://youtu.be/5f4n7vNq2zM" target="_blank">🎥 Animasyon Video İzle</a></p>
        </div>
        <div class="card">
            <h3>2. Üç Küçük Domuz</h3>
            <audio controls><source src="https://archive.org/download/childrens-short-works-056/uc_kucuk_domuz.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <!-- 7-12 Yaş -->
    <div id="cocuk712" class="tab">
        <h2 style="text-align:center; color:#2196F3;">🦊 7-12 Yaş Hikayeler</h2>
        <div class="card">
            <h3>Ali Baba ve Kırk Haramiler</h3>
            <audio controls><source src="https://archive.org/download/alibaba-librivox/ali_baba.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <!-- Yetişkinler -->
    <div id="yetiskin" class="tab">
        <h2 style="text-align:center; color:#9C27B0;">📖 Yetişkinler İçin Klasikler</h2>
        <div class="card">
            <h3>Küçük Prens (Bölüm 1)</h3>
            <audio controls><source src="https://archive.org/download/kucuk_prens_librivox/kucukprens_01.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        function searchContent() {
            let filter = document.getElementById("searchInput").value.toUpperCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.style.display = card.textContent.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            });
        }
    </script>
</body>
</html>
