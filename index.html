<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐕Cedric'in Masal Dünyası🐕 </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        header { padding: 25px 20px; background: #111; border-bottom: 1px solid #222; }
        h1 { font-size: 24px; margin: 0; color: #1DB954; font-weight: 800; }
        .section-title { padding: 25px 20px 10px; font-size: 19px; font-weight: bold; color: #fff; }
        .horizontal-scroll { display: flex; overflow-x: auto; padding: 10px 20px; gap: 15px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .book-card { min-width: 150px; background: #181818; border-radius: 12px; overflow: hidden; }
        .book-card img { width: 100%; height: 200px; object-fit: cover; }
        .book-info { padding: 12px; text-align: left; }
        .book-info h3 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        audio { width: 100%; height: 35px; filter: invert(100%); margin-top: 10px; }
        
        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 1px solid #282828; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #b3b3b3; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: #fff; }

        /* PARLAYAN OYUNLAR BUTONU CSS */
        .game-btn {
            background: linear-gradient(45deg, #ff00ea, #ffcc00, #00ffcc);
            background-size: 200% 200%;
            border-radius: 12px;
            margin: 5px;
            color: #fff !important;
            animation: rainbow 3s ease infinite, pulse 1.5s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .game-btn i { color: #fff !important; }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header><h1>🐕Cedric'in Masal Dünyası🐕 </h1></header>
    
    <div class="section-title">Popüler Masallar</div>
    
    <div class="horizontal-scroll">
        <div class="book-card">
            <img src="https://i.ytimg.com/vi/dJMn3kwCYtc/hq720.jpg?sqp=-oaymwE7CK4FEIIDSFryq4qpAy0IARUAAAAAGAElAADIQj0AgKJD8AEB-AHUBoAC4AOKAgwIABABGHIgQyg4MA8=&rs=AOn4CLC0G2ztKSVp4txkVpLW1DnevurBpw" alt="Verilen Söz Tutulmalı">
            <div class="book-info">
                <h3>Verilen Söz Tutulmalı</h3>
                <audio controls>
                    <source src="https://www.xn--edebiyatgretmeni-twb.net/wp-content/uploads/2014/06/verilen_soz_tutulmali.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
        
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Anasayfa</a>
        <a href="hikayeler.html" class="nav-item"><i class="fas fa-book-open"></i>Hikayeler</a>
        <a href="videolar.html" class="nav-item"><i class="fas fa-video"></i>Videolar</a>
        <a href="sesli-kitaplar.html" class="nav-item"><i class="fas fa-headphones"></i>Dinle</a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-paint-brush"></i>Boyama</a>
        <a href="oyunlar.html" class="nav-item game-btn"><i class="fas fa-gamepad"></i>Oyunlar</a>
    </div>
</body>
</html>
