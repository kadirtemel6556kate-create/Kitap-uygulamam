<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cedric'in oyun Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bulut: #FFFFFF; --gokyuzu: #87CEEB; --gunes: #FFD700; --elma: #FF595E; --deniz: #1982C4; }
        body { margin: 0; background: var(--gokyuzu); font-family: 'Fredoka One', cursive; text-align: center; padding-bottom: 120px; overflow: hidden; }
        
        /* Karşılama Ekranı */
        #welcomeOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(135, 206, 235, 0.95); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ai-bubble {
            background: white; padding: 20px; border-radius: 30px;
            margin: 20px; border: 5px solid var(--deniz); position: relative;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1); font-size: 20px;
        }

        .avatar { font-size: 100px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        .btn-start {
            background: var(--elma); color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-family: 'Fredoka One'; font-size: 24px;
            box-shadow: 0 8px 0 #b3393d; cursor: pointer;
        }

        /* Ana Menü */
        header { background: white; padding: 20px; border-bottom: 8px solid var(--gunes); border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .playground { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .toy-btn { background: white; border-radius: 30px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-decoration: none; border: 5px solid; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .btn-red { border-color: var(--elma); color: var(--elma); }
        .btn-blue { border-color: var(--deniz); color: var(--deniz); }
        
        .mic-status { color: var(--elma); font-size: 18px; margin-top: 10px; height: 30px; }
    </style>
</head>
<body>

<div id="welcomeOverlay">
    <div class="avatar">👦🏻</div>
    <div class="ai-bubble" id="statusBox">Merhaba! Benimle konuşmak için butona bas!</div>
    <button class="btn-start" onclick="baslatAI()">Hadi Başlayalım!</button>
</div>

<header><h1>Cedric'in Parkı</h1></header>

<div class="mic-status" id="micText"></div>

<div class="playground">
    <a href="hikayeler.html" id="link-hikaye" class="toy-btn btn-red"><i class="fas fa-book-open" style="font-size:40px;"></i><span>Masal Oku</span></a>
    <a href="oyunlar.html" id="link-oyun" class="toy-btn btn-blue"><i class="fas fa-gamepad" style="font-size:40px;"></i><span>Oyun Oyna</span></a>
</div>

<script>
    const statusBox = document.getElementById('statusBox');
    const micText = document.getElementById('micText');

    // 1. SESLENDİRME (Cedric Konuşuyor)
    function konus(metin) {
        const mesaj = new SpeechSynthesisUtterance(metin);
        mesaj.lang = 'tr-TR';
        mesaj.pitch = 1.3; // Çocuksu ses
        mesaj.rate = 1;
        window.speechSynthesis.speak(mesaj);
    }

    // 2. SES TANIMA (Çocuğu Dinliyor)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'tr-TR';
    recognition.continuous = false;

    function baslatAI() {
        document.getElementById('welcomeOverlay').style.opacity = "0.5";
        document.getElementById('welcomeOverlay').style.pointerEvents = "none";
        
        konus("Hoş geldin Kadir! Ben Cedric, senin oyun arkadaşınım. Beraber oyun oynayalım mı?");
        
        setTimeout(() => {
            micText.innerText = "Seni dinliyorum... (Evet/Hayır de)";
            recognition.start();
        }, 6000);
    }

    recognition.onresult = (event) => {
        const cevap = event.results[0][0].transcript.toLowerCase();
        micText.innerText = 'Söylediğin: "' + cevap + '"';

        if (cevap.includes("evet") || cevap.includes("olur") || cevap.includes("oynayalım")) {
            konus("Harika! Peki ne yapmak istersin? Masal mı okuyalım, yoksa oyun mu oynayalım?");
            statusBox.innerText = "Masal mı? Oyun mu?";
            
            setTimeout(() => {
                recognition.start(); // İkinci cevap için tekrar dinle
            }, 5000);
        } 
        else if (cevap.includes("masal") || cevap.includes("hikaye")) {
            konus("Tamam, hemen masal dünyasına gidiyoruz!");
            setTimeout(() => window.location.href = "hikayeler.html", 2000);
        }
        else if (cevap.includes("oyun")) {
            konus("Süper! En eğlenceli oyunları senin için hazırladım.");
            setTimeout(() => window.location.href = "oyunlar.html", 2000);
        }
        else {
            konus("Anlayamadım dostum, masal mı yoksa oyun mu?");
            setTimeout(() => recognition.start(), 3000);
        }
    };

    recognition.onerror = () => {
        micText.innerText = "Duyamadım, tekrar dener misin?";
        setTimeout(() => recognition.start(), 2000);
    };
</script>

</body>
</html>
