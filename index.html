<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitap Dünyam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            /* Alt menünün arkada kalmaması için gövdeye ekstra boşluk verdik */
            padding-bottom: 100px; 
        }

        header {
            padding: 20px;
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { font-size: 22px; margin: 0; color: #1DB954; }

        .section-title {
            padding: 20px 20px 10px;
            font-size: 18px;
            font-weight: bold;
            color: #eeeeee;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .book-card {
            min-width: 150px;
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .book-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .book-info { padding: 12px; text-align: center; }
        .book-info h3 { margin: 0 0 10px; font-size: 14px; }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(100%);
        }

        /* ALT MENÜ DÜZENLEMESİ (Telefon tuşlarından kurtardık) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            /* Alt boşluğu artırarak telefon tuşlarının üstüne çıkardık */
            padding: 15px 0 30px 0; 
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #888;
            text-decoration: none;
            flex: 1;
        }

        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item:active { color: #1DB954; transform: scale(0.9); }
        .nav-item.active { color: #1DB954; }

    </style>
</head>
<body>

<header id="top">
    <h1>Kitap Dünyam</h1>
</header>

<div id="populer" class="section-title">Popüler Masallar</div>
<div class="horizontal-scroll">
    <div class="book-card">
        <img src="1.jpg" alt="Masal 1">
        <div class="book-info">
            <h3>Kırmızı Başlıklı Kız</h3>
            <audio controls><source src="1.mp3" type="audio/mpeg"></audio>
        </div>
    </div>
    <div class="book-card">
        <img src="2.jpg" alt="Masal 2">
        <div class="book-info">
            <h3>Üç Küçük Domuz</h3>
            <audio controls><source src="2.mp3" type="audio/mpeg"></audio>
        </div>
    </div>
</div>

<div id="yeni" class="section-title">Yeni Eklenenler</div>
<div class="horizontal-scroll">
    <div class="book-card">
        <img src="4.jpg" alt="Masal 4">
        <div class="book-info">
            <h3>Keloğlan</h3>
            <audio controls><source src="4.mp3" type="audio/mpeg"></audio>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#top" class="nav-item active"><i class="fas fa-home"></i>Anasayfa</a>
    <a href="#populer" class="nav-item"><i class="fas fa-search"></i>Keşfet</a>
    <a href="#yeni" class="nav-item"><i class="fas fa-book"></i>Kitaplığım</a>
    <a href="#top" class="nav-item"><i class="fas fa-user"></i>Profil</a>
</div>

<script>
    // Küçük bir dokunuş: Butona basınca rengi değişsin
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.addEventListener('click', function() {
            navItems.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });
</script>

</body>
</html>
