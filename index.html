<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Dünyam - Dinle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f; /* Koyu siyah arka plan */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 80px;
        }

        header {
            padding: 20px;
            background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
            text-align: left;
        }

        h1 { font-size: 24px; margin: 0; color: #1DB954; } /* Spotify yeşili detay */

        .section-title {
            padding: 15px 20px 5px;
            font-size: 18px;
            font-weight: bold;
            color: #bbbbbb;
        }

        /* Yatay Kaydırma Alanı */
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 15px;
            scrollbar-width: none; /* Mouse tekerleği gizleme */
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* Kitap Kartları */
        .book-card {
            min-width: 140px;
            max-width: 140px;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .book-card img {
            width: 140px;
            height: 180px;
            object-fit: cover;
            background: #333; /* Resim yoksa gri görünsün */
        }

        .book-info {
            padding: 10px;
            font-size: 13px;
            text-align: center;
        }

        .book-info h3 { margin: 5px 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Ses Oynatıcı Stili */
        audio {
            width: 100%;
            height: 30px;
            filter: invert(100%); /* Siyah temaya uydurmak için */
            margin-top: 5px;
        }

        /* Alt Menü Barı (Dinlebi gibi) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #181818;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #333;
        }

        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #888;
            text-decoration: none;
        }

        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #1DB954; }

    </style>
</head>
<body>

<header>
    <h1>Kitap Dünyam</h1>
</header>

<div class="section-title">Popüler Masallar</div>
<div class="horizontal-scroll">
    <div class="book-card">
        <img src="1.jpg" alt="Masal 1">
        <div class="book-info">
            <h3>Kırmızı Başlıklı Kız</h3>
            <audio controls><source src="1.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <div class="book-card">
        <img src="2.jpg" alt="Masal 2">
        <div class="book-info">
            <h3>Üç Küçük Domuz</h3>
            <audio controls><source src="2.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <div class="book-card">
        <img src="3.jpg" alt="Masal 3">
        <div class="book-info">
            <h3>Pamuk Prenses</h3>
            <audio controls><source src="3.mp3" type="audio/mpeg"></audio>
        </div>
    </div>
</div>

<div class="section-title">Yeni Eklenenler</div>
<div class="horizontal-scroll">
    <div class="book-card">
        <img src="4.jpg" alt="Masal 4">
        <div class="book-info">
            <h3>Keloğlan</h3>
            <audio controls><source src="4.mp3" type="audio/mpeg"></audio>
        </div>
    </div>
    </div>

<div class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i>Anasayfa</a>
    <a href="#" class="nav-item"><i class="fas fa-search"></i>Keşfet</a>
    <a href="#" class="nav-item"><i class="fas fa-book"></i>Kitaplığım</a>
    <a href="#" class="nav-item"><i class="fas fa-user"></i>Profil</a>
</div>

</body>
</html>
