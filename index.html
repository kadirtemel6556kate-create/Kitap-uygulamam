<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cedric'in Dünyası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0b0b0b; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 120px; overflow-x: hidden; }
        
        /* Giriş Karşılama Alanı */
        .welcome-hero {
            background: linear-gradient(135deg, #1db954 0%, #121212 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .welcome-hero h1 { margin: 10px 0; font-size: 28px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .welcome-hero p { color: #e0e0e0; font-size: 16px; margin: 0; opacity: 0.9; }
        .avatar { width: 80px; height: 80px; background: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; border: 4px solid #1db954; }

        /* Kategori Menüsü (Kare Butonlar) */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: -20px;
        }
        .menu-card {
            background: #181818;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            border: 1px solid #282828;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .menu-card:active { transform: scale(0.95); }
        .menu-card i { font-size: 35px; }
        .menu-card span { font-weight: bold; font-size: 14px; }

        /* Renkler */
        .card-pink { border-bottom: 5px solid #ff00ea; }
        .card-green { border-bottom: 5px solid #1db954; }
        .card-blue { border-bottom: 5px solid #00ffcc; }
        .card-yellow { border-bottom: 5px solid #ffcc00; }
        .card-orange { border-bottom: 5px solid #ff6600; }

        /* Parlayan Oyun Kartı Özel */
        .card-game {
            background: linear-gradient(45deg, #181818, #2a1a2a);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px #ff00ea; }
            50% { box-shadow: 0 0 20px #ff00ea; }
            100% { box-shadow: 0 0 5px #ff00ea; }
        }

        /* Alt Menü (Sabit) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 1px solid #282828; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #b3b3b3; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: #fff; }
        
        /* Oyun Butonu (Navigasyon) */
        .game-btn {
            background: linear-gradient(45deg, #ff00ea, #ffcc00, #00ffcc);
            background-size: 200% 200%;
            border-radius: 12px; margin: 5px; color: #fff !important;
            animation: rainbow 3s ease infinite;
        }
        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    </style>
</head>
<body>

    <div class="welcome-hero">
        <div class="avatar">🐕</div>
        <h1>Hoş Geldin Kadir!</h1>
        <p>Bugün ne yapmak istersin? Macera seni bekliyor!</p>
    </div>

    <div class="grid-menu">
        <a href="hikayeler.html" class="menu-card card-green">
            <i class="fas fa-book-open" style="color: #1db954;"></i>
            <span>Hikaye Oku</span>
        </a>
        <a href="videolar.html" class="menu-card card-blue">
            <i class="fas fa-video" style="color: #00ffcc;"></i>
            <span>Video İzle</span>
        </a>
        <a href="sesli-kitaplar.html" class="menu-card card-yellow">
            <i class="fas fa-headphones" style="color: #ffcc00;"></i>
            <span>Masal Dinle</span>
        </a>
        <a href="boyama.html" class="menu-card card-orange">
            <i class="fas fa-paint-brush" style="color: #ff6600;"></i>
            <span>Boyama Yap</span>
        </a>
        <a href="oyunlar.html" class="menu-card card-pink card-game" style="grid-column: span 2;">
            <i class="fas fa-gamepad" style="color: #ff00ea;"></i>
            <span style="font-size: 18px;">OYUN DÜNYASINA GİRİŞ</span>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Anasayfa</a>
        <a href="hikayeler.html" class="nav-item"><i class="fas fa-book-open"></i>Hikayeler</a>
        <a href="videolar.html" class="nav-item"><i class="fas fa-video"></i>Videolar</a>
        <a href="sesli-kitaplar.html" class="nav-item"><i class="fas fa-headphones"></i>Dinle</a>
        <a href="boyama.html" class="nav-item"><i class="fas fa-paint-brush"></i>Boyama</a>
        <a href="oyunlar.html" class="nav-item game-btn"><i class="fas fa-gamepad"></i>Oyunlar</a>
    </div>

</body>
</html>
