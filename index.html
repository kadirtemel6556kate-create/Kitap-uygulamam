<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çocuk Eğitim Uygulaması</title>

<style>
:root{
    --sari:#FFCA3A;
    --arka:#FFFDF0;
    --mavi:#1982C4;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--arka);
    padding-bottom:120px;
}

/* HEADER */
header{
    background:var(--sari);
    padding:25px;
    text-align:center;
    color:white;
    font-size:22px;
    border-bottom:6px solid #E5B534;
}

/* KARTLAR */
.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    border:3px solid var(--sari);
    text-align:center;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
    text-decoration:none;
    color:black;
}

.card:hover{
    transform:scale(1.05);
    background:#fff3c4;
}

/* ALT MENÜ */
.candy-nav{
    position:fixed;
    bottom:15px;
    left:15px;
    right:15px;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-radius:40px;
    border:4px solid var(--sari);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.nav-link{
    font-size:22px;
    text-decoration:none;
}
</style>
</head>

<body>

<header>🎓 Çocuk Eğitim Uygulaması</header>

    <a class="card" href="ingilizce-balon.html">🎈 Balon Oyunu</a>

    <a class="card" href="sesli-kitaplar.html">🎧 Masallar</a>

</div>

<nav class="candy-nav">

    <a class="nav-link" href="index.html">🏠</a>
    <a class="nav-link" href="sesli-kitaplar.html">🎧</a>
    <a class="nav-link" href="ingilizce.html">🎮</a>
    <a class="nav-link" href="ingilizce-eslestirme.html">🧠</a>
    <a class="nav-link" href="ingilizce-balon.html">🎈</a>

</nav>

</body>
</html>
