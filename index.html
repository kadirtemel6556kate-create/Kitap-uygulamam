        <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitap Dünyam</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #333;
    }

    header {
      padding: 20px;
      text-align: center;
      color: white;
    }

    .search {
      margin: 20px;
      text-align: center;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .menu button {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu button:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .card {
      background: white;
      margin: 20px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin-top: 0;
    }

    audio, video {
      width: 100%;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      color: white;
      padding: 10px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Kitap Dünyam</h1>
  <p>Masallar, Hikayeler ve Videolar</p>
</header>

<div class="search">
  <input type="text" placeholder="Masal veya hikaye ara...">
</div>

<div class="menu">
  <button>0-6 Yaş</button>
  <button>7-12 Yaş</button>
  <button>Yetişkin</button>
  <button>Popüler</button>
  <button>Yeni Eklenenler</button>
  <button>Sesli Kitaplar</button>
  <button>Videolar</button>
</div>

<div class="card">
  <h3>1. Kırmızı Başlıklı Kız</h3>
  <audio controls>
    <source src="audio1.mp3" type="audio/mpeg">
  </audio>
  <video controls>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<div class="card">
  <h3>2. Üç Küçük Domuz</h3>
  <audio controls>
    <source src="audio2.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="card">
  <h3>3. Pamuk Prenses</h3>
  <audio controls>
    <source src="audio3.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="card">
  <h3>4. Keloğlan Masalı</h3>
  <audio controls>
    <source src="audio4.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="card">
  <h3>5. Nasreddin Hoca Fıkraları</h3>
  <audio controls>
    <source src="audio5.mp3" type="audio/mpeg">
  </audio>
</div>

<footer>
  <p>© 2026 Kitap Dünyam</p>
</footer>

</body>
</html>
