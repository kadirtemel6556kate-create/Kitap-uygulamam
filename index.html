<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun Arkadasim Cedric</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Fredoka One', cursive;
    background: #FFFDF0;
    text-align: center;
    padding-bottom: 100px; /* Menüye yer açmak için */
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
}

header {
    background: #FF595E;
    padding: 20px;
    color: white;
    font-size: 22px;
    border-bottom: 6px solid #D6454B;
}

.menu-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

/* Kart Tasarımları */
.card {
    background: white;
    border-radius: 25px 35px 20px 40px;
    padding: 20px;
    text-decoration: none;
    color: #333;
    font-size: 14px;
    border: 4px solid #eee;
    box-shadow: 0 6px 0 rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.card img { width: 60px; height: 60px; object-fit: contain; }

/* Kart Renkleri */
.c-blue { border-color: #1982C4; }
.c-green { border-color: #66BB6A; }
.c-yellow { border-color: #FFCA3A; }
.c-red { border-color: #FF595E; }
.c-purple { border-color: #A44CD3; }

/* --- ALT MENÜ DÜZELTMESİ --- */
.candy-nav {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 15px;
    border-radius: 50px;
    border: 4px solid #FF595E;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 1000; /* Her zaman en üstte görünsün */
}

.nav-link {
    text-decoration: none;
    font-size: 24px;
    color: #FF595E;
    transition: transform 0.2s;
}

.nav-link:active { transform: scale(1.2); }

</style>
</head>
<body>

<header>🐶 Oyun Arkadasim Cedric 🐶</header>

<div class="menu-container">
    <a href="kitaplik.html" class="card c-red">
        <img src="https://cdn-icons-png.flaticon.com/512/3429/3429149.png">
        <span>Cedric Kitaplik</span>
    </a>
    
    <a href="kelimeler.html" class="card c-blue">
        <img src="https://cdn-icons-png.flaticon.com/512/4392/4392525.png">
        <span>Ingilizce Kelimeler</span>
    </a>

    <a href="oyun.html" class="card c-green">
        <img src="https://cdn-icons-png.flaticon.com/512/3082/3082060.png">
        <span>Ingilizce Kelime Oyunu</span>
    </a>

    <a href="videolar.html" class="card c-yellow">
        <img src="https://cdn-icons-png.flaticon.com/512/3163/3163508.png">
        <span>Cizgi Film Izle</span>
    </a>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house"></i></a>
    <a href="kitaplik.html" class="nav-link"><i class="fas fa-book"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-play"></i></a>
    <a href="sesli.html" class="nav-link"><i class="fas fa-headphones"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
</nav>

</body>
</html>
