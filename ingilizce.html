<style>
body{text-align:center;font-family:Arial;background:#FFFDF0;padding-bottom:120px;}
header{background:#FFCA3A;padding:20px;color:white;font-size:22px;}
button{width:80%;padding:15px;margin:10px;border:none;border-radius:15px;background:#1982C4;color:white;}
.card{margin:20px;font-size:20px;}
.candy-nav{position:fixed;bottom:15px;left:15px;right:15px;background:white;display:flex;justify-content:space-around;padding:12px;border-radius:40px;border:4px solid #FFCA3A;}

<body>

<header>🎮 Quiz</header>

<div class="card" id="q">Soru</div>

<button onclick="c('a')" id="a"></button>
<button onclick="c('b')" id="b"></button>
<button onclick="c('c')" id="c"></button>

<script>
let i=0;
let s=[
{q:"Cat?",a:"Kedi",b:"Köpek",c:"Araba",d:"a"},
{q:"Dog?",a:"Köpek",b:"Kedi",c:"Su",d:"a"},
{q:"Apple?",a:"Elma",b:"Araba",c:"Kuş",d:"a"}
];

function load(){
let x=s[i];
q.innerText=x.q;
a.innerText="A "+x.a;
b.innerText="B "+x.b;
c.innerText="C "+x.c;
}

function c(v){
i++;
if(i>=s.length)i=0;
load();
}

load();
</script>
