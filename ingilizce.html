<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ingilizce Kelime Oyunu</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Fredoka One', cursive; /* Daha cocuksu font */
    background:#FFFDF0;
    text-align:center;
    padding-bottom:120px;
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
}

header{
    background:#FFCA3A;
    padding:20px;
    color:white;
    font-size:22px;
    border-bottom: 6px solid #e5b534;
}

.stats{
    font-size:16px;
    color:#1982C4;
    margin:10px;
    background: white;
    padding: 10px;
    border-radius: 20px;
    display: inline-block;
    border: 3px solid #1982C4;
}

.card{
    background:white;
    margin:15px;
    padding:25px;
    border-radius:25px 35px 20px 40px;
    border:5px solid #FFCA3A;
    font-size:22px;
    min-height:70px;
    box-shadow: 8px 8px 0px rgba(255, 202, 58, 0.2);
}

button{
    display:block;
    margin:15px auto;
    padding:15px;
    width:85%;
    border:none;
    border-radius:20px;
    font-size:18px;
    background:#1982C4;
    color:white;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 6px 0 #13669a;
    transition: 0.1s;
}

button:active { transform: translateY(4px); box-shadow: 0 2px 0 #13669a; }

.timer{ font-size:20px; color:#FF595E; margin:10px; font-weight: bold; }

/* --- YENİ ÇOCUKSU MESAJ KUTUSU --- */
#mesaj-kutusu {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 8px solid #FFCA3A;
    border-radius: 40px;
    padding: 30px;
    text-align: center;
    z-index: 1000;
    box-shadow: 0 0 100px rgba(0,0,0,0.2);
    width: 280px;
}
#mesaj-kutusu h2 { margin: 0 0 20px 0; font-size: 28px; }
#mesaj-kutusu button { width: 100%; background: #66BB6A; box-shadow: 0 6px 0 #4d8d50; }

.overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 999;
}

/* ALT MENÜ */
.candy-nav{
    position:fixed;
    bottom:15px;
    left:15px;
    right:15px;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-radius:40px;
    border:4px solid #FFCA3A;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.nav-link{ text-decoration:none; font-size:22px; }
</style>
</head>

<body>

<header>🎮 INGILIZCE KELIME OYUNU</header>

<div class="stats">
⭐ Puan: <span id="puan">0</span> |
🏆 Level: <span id="level">1</span> |
❤️ Can: <span id="can">3</span>
</div>

<div class="timer">⏱️ <span id="time">10</span> saniye</div>

<div class="card" id="soru">Yükleniyor...</div>

<button onclick="cevap('a')" id="a">A</button>
<button onclick="cevap('b')" id="b">B</button>
<button onclick="cevap('c')" id="c">C</button>

<div class="overlay" id="perde"></div>
<div id="mesaj-kutusu">
    <h2 id="mesaj-baslik">Başlık</h2>
    <button onclick="mesajKapat()" id="mesaj-buton">Tamam!</button>
</div>

<script>
let puan = 0;
let level = 1;
let can = 3;
let aktif = 0;
let time = 10;
let interval;

let sorular = [
    {q:"Cat ne demek?", a:"Kedi", b:"Köpek", c:"Araba", d:"a"},
    {q:"Dog ne demek?", a:"Köpek", b:"Kedi", c:"Su", d:"a"},
    {q:"Apple ne demek?", a:"Elma", b:"Araba", c:"Kuş", d:"a"},
    {q:"Car ne demek?", a:"Araba", b:"Ev", c:"Kedi", d:"a"},
    {q:"Sun ne demek?", a:"Güneş", b:"Ay", c:"Yıldız", d:"a"},
    {q:"Moon ne demek?", a:"Ay", b:"Güneş", c:"Araba", d:"a"},
    {q:"Water ne demek?", a:"Su", b:"Ateş", c:"Toprak", d:"a"},
    {q:"Book ne demek?", a:"Kitap", b:"Kalem", c:"Defter", d:"a"},
    {q:"Pen ne demek?", a:"Kalem", b:"Kitap", c:"Silgi", d:"a"},
    {q:"School ne demek?", a:"Okul", b:"Ev", c:"Park", d:"a"}
];

function guncelle(){
    document.getElementById("puan").innerText = puan;
    document.getElementById("level").innerText = level;
    document.getElementById("can").innerText = can;
}

function soruYukle(){
    let s = sorular[aktif];
    document.getElementById("soru").innerText = s.q;
    document.getElementById("a").innerText = "A) " + s.a;
    document.getElementById("b").innerText = "B) " + s.b;
    document.getElementById("c").innerText = "C) " + s.c;
    time = 10;
    sayac();
}

function sayac(){
    clearInterval(interval);
    interval = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = time;
        if(time <= 0){
            clearInterval(interval);
            ozelMesajGoster("⏰ Süre Bitti!", "#FF595E");
            yanlis();
        }
    },1000);
}

function ozelMesajGoster(metin, renk) {
    document.getElementById("mesaj-baslik").innerText = metin;
    document.getElementById("mesaj-baslik").style.color = renk;
    document.getElementById("mesaj-kutusu").style.borderColor = renk;
    document.getElementById("mesaj-kutusu").style.display = "block";
    document.getElementById("perde").style.display = "block";
}

function mesajKapat() {
    document.getElementById("mesaj-kutusu").style.display = "none";
    document.getElementById("perde").style.display = "none";
    
    if (can <= 0) {
        location.reload();
    } else {
        aktif++;
        if(aktif >= sorular.length) aktif = 0;
        soruYukle();
    }
}

function cevap(sec){
    clearInterval(interval);
    if(sec == sorular[aktif].d){
        puan += 10;
        if(puan >= 30) level = 2;
        ozelMesajGoster("🎉 Harika! Doğru", "#66BB6A");
    } else {
        can--;
        if(can <= 0) {
            ozelMesajGoster("💀 Oyun Bitti!", "#FF595E");
        } else {
            ozelMesajGoster("❌ Ups! Yanlış", "#FF595E");
        }
    }
    guncelle();
}

soruYukle();
guncelle();
</script>

<nav class="candy-nav">
    <a href="index.html" class="nav-link">🏠</a>
</nav>

</body>
</html>
