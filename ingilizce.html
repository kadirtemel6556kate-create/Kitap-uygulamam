<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Oyun</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#FFFDF0;
    text-align:center;
    padding-bottom:100px;
}

header{
    background:#FFCA3A;
    padding:20px;
    color:white;
    font-size:22px;
}

.score{
    margin:10px;
    font-size:18px;
    color:#1982C4;
}

.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:20px;
    border:3px solid #FFCA3A;
    font-size:22px;
}

button{
    display:block;
    margin:10px auto;
    padding:15px;
    width:80%;
    border:none;
    border-radius:15px;
    font-size:18px;
    background:#1982C4;
    color:white;
}
</style>
</head>

<body>

<header>🎮 İngilizce Oyun</header>

<div class="score">
⭐ Puan: <span id="puan">0</span>
</div>

<div class="card" id="soru">Soru geliyor...</div>

<button onclick="cevap('a')">A</button>
<button onclick="cevap('b')">B</button>
<button onclick="cevap('c')">C</button>

<script>

let puan = 0;

let sorular = [
{
    soru:"Cat ne demek?",
    a:"Araba",
    b:"Kedi",
    c:"Elma",
    dogru:"b"
},
{
    soru:"Dog ne demek?",
    a:"Köpek",
    b:"Kedi",
    c:"Araba",
    dogru:"a"
},
{
    soru:"Apple ne demek?",
    a:"Elma",
    b:"Araba",
    c:"Köpek",
    dogru:"a"
}
];

let aktif = 0;

function soruGetir(){
    let s = sorular[aktif];
    document.getElementById("soru").innerText = s.soru;

    document.querySelectorAll("button")[0].innerText = "A) " + s.a;
    document.querySelectorAll("button")[1].innerText = "B) " + s.b;
    document.querySelectorAll("button")[2].innerText = "C) " + s.c;
}

function cevap(secim){
    if(secim == sorular[aktif].dogru){
        puan += 10;
        alert("🎉 Doğru!");
    }else{
        alert("❌ Yanlış!");
    }

    document.getElementById("puan").innerText = puan;

    // SONRAKİ SORUYA GEÇ
    aktif++;

    if(aktif >= sorular.length){
        aktif = 0; // başa döner
    }

    soruGetir();
}

soruGetir();

</script>

</body>
</html>
