<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesli Kitaplar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --ses-sari: #FFCA3A;
            --ses-turuncu: #FF924C;
            --ses-kirmizi: #FF595E;
            --ses-mor: #6A4C93;
            --arka-plan: #FFFDF0;
        }

        body { 
            margin: 0; 
            background: var(--arka-plan);
            font-family: 'Fredoka One', cursive;
            padding-bottom: 120px;
        }

        header {
            background: var(--ses-sari); 
            padding: 30px;
            text-align: center;
            border-bottom: 10px solid #E5B534;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 26px; color: #FFF; text-shadow: 2px 2px rgba(0,0,0,0.1); }

        .audio-shelf {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 25px;
        }

        .audio-card {
            background: white;
            height: 180px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 4px solid;
        }

        .audio-card:active { transform: scale(0.95); }

        .audio-card i {
            font-size: 45px;
            margin-bottom: 12px;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.1));
        }

        .audio-card span {
            font-size: 16px;
            text-align: center;
            padding: 0 10px;
            line-height: 1.2;
            font-weight: bold;
        }

        /* Kart Renkleri ve Borderlar */
        .c-yellow { border-color: var(--ses-sari); color: var(--ses-sari); }
        .c-orange { border-color: var(--ses-turuncu); color: var(--ses-turuncu); }
        .c-red { border-color: var(--ses-kirmizi); color: var(--ses-kirmizi); }
        .c-purple { border-color: var(--ses-mor); color: var(--ses-mor); }

        .candy-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 40px;
            border: 4px solid var(--ses-sari);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--ses-sari); }
    </style>
</head>
<body>

    <header>
        <h1>Sesli Kitaplar</h1>
    </header>

    <div class="audio-shelf">
        <a href="dinle1.html" class="audio-card c-yellow">
            <i class="fas fa-headphones"></i>
            <span>Uyku Masali</span>
        </a>

        <a href="dinle2.html" class="audio-card c-orange">
            <i class="fas fa-music"></i>
            <span>Neseli Sarkilar</span>
        </a>

        <a href="dinle3.html" class="audio-card c-red">
            <i class="fas fa-volume-up"></i>
            <span>Orman Sesleri</span>
        </a>

        <a href="dinle4.html" class="audio-card c-purple">
            <i class="fas fa-microphone-alt"></i>
            <span>Masal Anlatıcısı</span>
        </a>
    </div>

    <nav class="candy-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
        <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
        <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
        <a href="sesli-kitaplar.html" class="nav-link active"><i class="fas fa-headphones"></i></a>
        <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
        <a href="oyunlar.html" class="nav-link"><i class="fas fa-ghost"></i></a>
    </nav>

</body>
</html>
