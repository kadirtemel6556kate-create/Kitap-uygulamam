<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesli Kitaplar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --mor: #A29BFE; --arka: #F8F7FF; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; }
        header { background: var(--mor); padding: 25px; text-align: center; border-bottom: 8px solid #867bef; }
        h1 { margin: 0; color: white; font-size: 22px; }
        
        .list-container { padding: 20px; }
        .audio-item { 
            background: white; border-radius: 25px; padding: 20px; 
            margin-bottom: 15px; border: 4px solid var(--mor);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 6px 0 rgba(162, 155, 254, 0.2);
        }
        .info { display: flex; align-items: center; }
        .info i { font-size: 24px; color: var(--mor); margin-right: 15px; }
        .info span { font-size: 16px; color: #444; }
        
        .play-btn { background: var(--mor); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-family: 'Fredoka One', cursive; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--mor);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--mor); }
    </style>
</head>
<body>

<header><h1>Sesli Kitaplar</h1></header>

<div class="list-container">
    <div class="audio-item">
        <div class="info"><i class="fas fa-headphones"></i><span>Masal Dinle</span></div>
        <button class="play-btn" onclick="sesCal('SENIN_SES_LINKIN')">DINLE</button>
    </div>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link active"><i class="fas fa-headphones"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
    <a href="hayvanlar.html" class="nav-link"><i class="fas fa-paw"></i></a>
</nav>

<script>
    var ses = new Audio();
    function sesCal(link) {
        ses.src = link;
        ses.play();
    }
</script>

</body>
</html>
