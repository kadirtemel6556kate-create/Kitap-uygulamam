<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Boyama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Boyama Zamanı!</h1>

    <!-- Çizim Araçları -->
    <div class="arac-kutusu">
        <div class="renk-paleti">
            <!-- DÜZELTME 1: Renk kodları artık CSS'den değil, doğrudan buradan geliyor. Bu, APK'da görünmelerini garantiler. -->
            <span class="renk-secim aktif" style="background-color: black;" data-renk="black"></span>
            <span class="renk-secim" style="background-color: #FF4B4B;" data-renk="#FF4B4B"></span>
            <span class="renk-secim" style="background-color: #00A8F3;" data-renk="#00A8F3"></span>
            <span class="renk-secim" style="background-color: #4CAF50;" data-renk="#4CAF50"></span>
            <span class="renk-secim" style="background-color: #FFD600;" data-renk="#FFD600"></span>
        </div>
        <div class="araclar">
            <button class="arac" data-boyut="2">S</button>
            <button class="arac aktif" data-boyut="5">M</button>
            <button class="arac" data-boyut="10">L</button>
            <!-- DÜZELTME 2: İkon yerine artık metin kullanıyoruz -->
            <button class="arac" id="silgi-buton">Silgi</button>
            <button class="arac" id="temizle-buton">🗑️</button>
        </div>
    </div>

    <!-- Çizim Yapılacak Alan -->
    <canvas id="cizim-alani"></canvas>

    <a href="index.html" class="menu-buton geri-buton">Ana Menüye Dön</a>

    <script>
        const canvas = document.getElementById('cizim-alani');
        const ctx = canvas.getContext('2d');
        const aracKutusu = document.querySelector('.arac-kutusu');

        // Canvas boyutunu ekran genişliğine göre ayarla
        canvas.width = window.innerWidth * 0.95;
        canvas.height = window.innerHeight * 0.55;

        let cizimYapiliyor = false;
        let fircaRengi = 'black';
        let fircaBoyutu = 5;
        let sonRenk = 'black'; // Silgiden sonra eski renge dönmek için

        function baslangicRengi() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        baslangicRengi();

        function cizimBaslat(e) { cizimYapiliyor = true; ciz(e); }
        function cizimBitir() { cizimYapiliyor = false; ctx.beginPath(); }

        function ciz(e) {
            if (!cizimYapiliyor) return;
            e.preventDefault(); // DÜZELTME 3: Dokunmatik kaydırmayı engelle

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = fircaBoyutu;
            ctx.lineCap = 'round';
            ctx.strokeStyle = fircaRengi;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        aracKutusu.addEventListener('click', (e) => {
            const hedef = e.target;
            if (!hedef.closest('.arac') && !hedef.closest('.renk-secim')) return;

            const mevcutAktifler = aracKutusu.querySelectorAll('.aktif');
            mevcutAktifler.forEach(btn => btn.classList.remove('aktif'));
            
            if (hedef.dataset.renk) {
                fircaRengi = hedef.dataset.renk;
                sonRenk = fircaRengi;
                hedef.classList.add('aktif');
            }
            if (hedef.dataset.boyut) {
                hedef.classList.add('aktif');
                fircaBoyutu = hedef.dataset.boyut;
            }
            if (hedef.id === 'silgi-buton') {
                fircaRengi = 'white';
                hedef.classList.add('aktif');
            }
            if (hedef.id === 'temizle-buton') {
                baslangicRengi();
            }
        });

        canvas.addEventListener('mousedown', cizimBaslat);
        canvas.addEventListener('mouseup', cizimBitir);
        canvas.addEventListener('mousemove', ciz);
        canvas.addEventListener('mouseout', cizimBitir);
        canvas.addEventListener('touchstart', cizimBaslat, { passive: false });
        canvas.addEventListener('touchend', cizimBitir);
        canvas.addEventListener('touchmove', ciz, { passive: false });
    </script>
</body>
</html>
