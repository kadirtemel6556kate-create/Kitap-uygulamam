<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Boyama</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --nane: #8AC926; --arka-plan: #F0F4F8; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            overscroll-behavior-y: contain; background: var(--arka-plan);
            font-family: 'Fredoka One', cursive; touch-action: none;
        }

        header { background: white; padding: 15px; border-bottom: 6px solid var(--nane); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; text-align: center; }
        h1 { margin: 0; font-size: 22px; color: var(--nane); }

        .templates { display: flex; justify-content: center; gap: 10px; padding: 10px; }
        .template-btn { background: white; border: 3px solid #ddd; border-radius: 15px; padding: 8px; font-size: 25px; cursor: pointer; }
        .template-btn.active { border-color: var(--nane); transform: scale(1.1); background: #f9f9f9; }

        .canvas-area { position: relative; width: 90vw; height: 55vh; margin: 10px auto; background: white; border-radius: 25px; border: 8px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; }
        #paintingCanvas { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; }
        /* Şablon resmi - başlangıçta görünmez */
        #templateImage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; object-fit: contain; opacity: 0.2; z-index: 1; pointer-events: none; display: none; }

        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .color-btn.active { transform: scale(1.2); border-color: #444; }
        .eraser-btn { background: #f0f0f0; color: #666; font-size: 20px; }

        .controls { display: flex; justify-content: center; padding-bottom: 100px; }
        .action-btn { background: white; border: none; padding: 10px 20px; border-radius: 20px; font-family: 'Fredoka One'; box-shadow: 0 5px 0 #ddd; cursor: pointer; }

        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 40px; border: 4px solid var(--nane); box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active-link { color: var(--nane); }
    </style>
</head>
<body scroll="no">

<header><h1>🎨 Sihirli Boyama</h1></header>

<div class="templates">
    <div class="template-btn active" onclick="setTemplate('', this)">⬜</div> <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/415/415733.png', this)">🍎</div>
    <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/741/741407.png', this)">🚗</div>
    <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/616/616430.png', this)">🐱</div>
</div>

<div class="canvas-area" id="canvasContainer">
    <img id="templateImage" src="">
    <canvas id="paintingCanvas"></canvas>
</div>

<div class="palette">
    <div class="color-btn active" style="background: #FF595E;" onclick="setColor('#FF595E', this)"></div>
    <div class="color-btn" style="background: #FFCA3A;" onclick="setColor('#FFCA3A', this)"></div>
    <div class="color-btn" style="background: #8AC926;" onclick="setColor('#8AC926', this)"></div>
    <div class="color-btn" style="background: #1982C4;" onclick="setColor('#1982C4', this)"></div>
    <div class="color-btn" style="background: #6A4C93;" onclick="setColor('#6A4C93', this)"></div>
    <div class="color-btn eraser-btn" onclick="setEraser(this)"><i class="fas fa-eraser"></i></div>
</div>

<div class="controls">
    <button class="action-btn" onclick="clearCanvas()"><i class="fas fa-trash"></i> Hepsini Sil</button>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open-reader"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-circle-play"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-high"></i></a>
    <a href="boyama.html" class="nav-link active-link"><i class="fas fa-wand-magic-sparkles"></i></a>
    <a href="oyunlar.html" class="nav-link"><i class="fas fa-gamepad"></i></a>
</nav>

<script>
    const canvas = document.getElementById('paintingCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    const templateImg = document.getElementById('templateImage');
    let painting = false;
    let color = "#FF595E";
    let eraserActive = false;

    // Mobil kaydırmayı engelleme
    document.addEventListener('touchmove', function(e) {
        if (e.target.id === 'paintingCanvas') e.preventDefault();
    }, { passive: false });

    function setupCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.lineCap = 'round';
        ctx.lineWidth = 12;
    }

    window.onload = setupCanvas;
    window.onresize = setupCanvas;

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startPosition(e) {
        painting = true;
        const coords = getCoords(e);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
    }

    function draw(e) {
        if (!painting) return;
        const coords = getCoords(e);
        
        if(eraserActive) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 30;
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = color;
            ctx.lineWidth = 12;
        }

        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
    }

    function finishedPosition() { painting = false; }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('touchstart', startPosition);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', finishedPosition);

    function setColor(newColor, btn) {
        color = newColor;
        eraserActive = false;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setEraser(btn) {
        eraserActive = true;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setTemplate(src, btn) {
        if (src === '') {
            templateImg.style.display = 'none';
            templateImg.src = '';
        } else {
            templateImg.style.display = 'block';
            templateImg.src = src;
        }
        document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
