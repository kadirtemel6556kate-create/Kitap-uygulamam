<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Boyama Zamanı!</h1>
    <p>İstediğin rengi seç ve çizmeye başla.</p>

    <!-- Çizim Araçları -->
    <div class="arac-kutusu">
        <div class="renk-paleti">
            <span class="renk-secim aktif" style="background-color: black;" data-renk="black"></span>
            <span class="renk-secim" style="background-color: red;" data-renk="red"></span>
            <span class="renk-secim" style="background-color: blue;" data-renk="blue"></span>
            <span class="renk-secim" style="background-color: green;" data-renk="green"></span>
            <span class="renk-secim" style="background-color: yellow;" data-renk="yellow"></span>
        </div>
        <div class="firca-boyutlari">
            <button class="arac" data-boyut="2">S</button>
            <button class="arac aktif" data-boyut="5">M</button>
            <button class="arac" data-boyut="10">L</button>
        </div>
        <button class="arac" id="silgi-buton">✏️</button>
        <button class="arac" id="temizle-buton">🗑️</button>
    </div>

    <!-- Çizim Yapılacak Alan -->
    <canvas id="cizim-alani" width="500" height="400"></canvas>

    <a href="index.html" class="menu-buton geri-buton">Ana Menüye Dön</a>

    <script>
        const canvas = document.getElementById('cizim-alani');
        const ctx = canvas.getContext('2d');
        const aracKutusu = document.querySelector('.arac-kutusu');

        let cizimYapiliyor = false;
        let fircaRengi = 'black';
        let fircaBoyutu = 5;

        // Canvas'ı başlangıçta beyaz yap
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function cizimBaslat(e) {
            cizimYapiliyor = true;
            ciz(e);
        }

        function cizimBitir() {
            cizimYapiliyor = false;
            ctx.beginPath(); // Bir sonraki çizim için yolu sıfırla
        }

        function ciz(e) {
            if (!cizimYapiliyor) return;

            // Mouse ve dokunmatik ekran koordinatlarını al
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = fircaBoyutu;
            ctx.lineCap = 'round'; // Çizgi uçlarını yuvarlak yap
            ctx.strokeStyle = fircaRengi;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Araç kutusu tıklamalarını yönet
        aracKutusu.addEventListener('click', (e) => {
            const hedef = e.target;

            // Aktif buton stilini güncelle
            const aktifButonlar = aracKutusu.querySelectorAll('.aktif');
            aktifButonlar.forEach(btn => btn.classList.remove('aktif'));
            hedef.classList.add('aktif');

            // Renk değiştirme
            if (hedef.dataset.renk) {
                fircaRengi = hedef.dataset.renk;
                document.getElementById('silgi-buton').classList.remove('aktif'); // Silgi aktifse kapat
            }
            // Fırça boyutu değiştirme
            if (hedef.dataset.boyut) {
                fircaBoyutu = hedef.dataset.boyut;
            }
            // Silgi butonu
            if (hedef.id === 'silgi-buton') {
                fircaRengi = 'white'; // Silgi rengi arka plan rengiyle aynı olmalı
            }
            // Temizle butonu
            if (hedef.id === 'temizle-buton') {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hedef.classList.remove('aktif'); // Temizledikten sonra aktif kalmasın
            }
        });

        // Event Listeners for Mouse
        canvas.addEventListener('mousedown', cizimBaslat);
        canvas.addEventListener('mouseup', cizimBitir);
        canvas.addEventListener('mousemove', ciz);
        canvas.addEventListener('mouseout', cizimBitir);

        // Event Listeners for Touch
        canvas.addEventListener('touchstart', cizimBaslat);
        canvas.addEventListener('touchend', cizimBitir);
        canvas.addEventListener('touchmove', ciz);

    </script>
</body>
</html>
