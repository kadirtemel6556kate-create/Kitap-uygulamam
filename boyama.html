<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Boyama</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pembe: #FF85A2; --mavi: #4ECDC4; --sari: #FFE66D; --nane: #8AC926; --arka-plan: #F0F4F8; }
        body { margin: 0; background: var(--arka-plan); font-family: 'Fredoka One', cursive; text-align: center; overflow: hidden; touch-action: none; }
        
        header { background: white; padding: 15px; border-bottom: 6px solid var(--nane); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        h1 { margin: 0; font-size: 22px; color: var(--nane); }

        /* Şablon Seçici */
        .templates { display: flex; justify-content: center; gap: 15px; padding: 10px; }
        .template-btn { background: white; border: 3px solid #ddd; border-radius: 15px; padding: 10px; font-size: 25px; cursor: pointer; transition: 0.2s; }
        .template-btn.active { border-color: var(--nane); transform: scale(1.1); background: #E8F5E9; }

        /* Boyama Alanı Konteynırı */
        .canvas-area { position: relative; width: 90vw; height: 50vh; margin: 10px auto; background: white; border-radius: 25px; border: 8px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; }
        
        #paintingCanvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; touch-action: none; }
        #templateImage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; object-fit: contain; opacity: 0.2; z-index: 1; pointer-events: none; }

        /* Renk Paleti */
        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .color-btn.active { transform: scale(1.2); border-color: #444; }

        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .action-btn { background: white; border: none; padding: 12px 25px; border-radius: 20px; font-family: 'Fredoka One'; color: #666; box-shadow: 0 5px 0 #ddd; cursor: pointer; }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #ddd; }

        .candy-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 40px; border: 4px solid var(--nane); box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--nane); }
    </style>
</head>
<body>

<header><h1>🎨 Sihirli Boyama</h1></header>

<div class="templates">
    <div class="template-btn" onclick="setTemplate('')">⬜</div>
    <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/415/415733.png')">🍎</div>
    <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/741/741407.png')">🚗</div>
    <div class="template-btn" onclick="setTemplate('https://cdn-icons-png.flaticon.com/512/616/616430.png')">🐱</div>
</div>

<div class="canvas-area" id="canvasContainer">
    <img id="templateImage" src="" alt="">
    <canvas id="paintingCanvas"></canvas>
</div>

<div class="palette">
    <div class="color-btn active" style="background: #FF595E;" onclick="setColor('#FF595E', this)"></div>
    <div class="color-btn" style="background: #FFCA3A;" onclick="setColor('#FFCA3A', this)"></div>
    <div class="color-btn" style="background: #8AC926;" onclick="setColor('#8AC926', this)"></div>
    <div class="color-btn" style="background: #1982C4;" onclick="setColor('#1982C4', this)"></div>
    <div class="color-btn" style="background: #6A4C93;" onclick="setColor('#6A4C93', this)"></div>
    <div class="color-btn" style="background: #000000;" onclick="setColor('#000000', this)"></div>
</div>

<div class="controls">
    <button class="action-btn" onclick="clearCanvas()"><i class="fas fa-trash"></i> Sil</button>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open-reader"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-circle-play"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-volume-high"></i></a>
    <a href="boyama.html" class="nav-link active"><i class="fas fa-wand-magic-sparkles"></i></a>
    <a href="oyunlar.html" class="nav-link"><i class="fas fa-gamepad"></i></a>
</nav>

<script>
    const canvas = document.getElementById('paintingCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    let painting = false;
    let color = "#FF595E";

    // Ses Motoru
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function sesCal(f, t, s) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + s);
    }

    function setupCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.lineCap = 'round';
        ctx.lineWidth = 10;
    }

    window.onload = setupCanvas;

    function startPosition(e) { painting = true; draw(e); }
    function finishedPosition() { painting = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.strokeStyle = color;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', startPosition);
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', draw);

    function setColor(newColor, btn) {
        color = newColor;
        sesCal(600, 'sine', 0.1);
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setTemplate(src) {
        document.getElementById('templateImage').src = src;
        sesCal(800, 'sine', 0.1);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        sesCal(300, 'sawtooth', 0.2);
    }
</script>

</body>
</html>
