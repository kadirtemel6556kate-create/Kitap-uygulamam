<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hayvanlar Alemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --turuncu: #FB8500; --arka: #FFF9F0; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; text-align: center; }
        header { background: var(--turuncu); padding: 25px; border-bottom: 8px solid #E87600; }
        h1 { margin: 0; color: white; font-size: 22px; }

        .animal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; }
        
        .animal-card {
            background: white; border-radius: 35px; padding: 15px; 
            border: 5px solid var(--turuncu); box-shadow: 0 8px 0 #FFD8A8;
            cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; align-items: center;
        }
        
        .animal-card:active { transform: scale(0.95); background: #FFF4E5; }
        
        .img-box {
            width: 100px; height: 100px; 
            background: #fdf2e9; border-radius: 25px; 
            margin-bottom: 10px; display: flex; 
            align-items: center; justify-content: center;
            font-size: 50px;
        }

        .animal-card b { color: #555; font-size: 16px; letter-spacing: 1px; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--turuncu);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--turuncu); }
    </style>
</head>
<body>

<header><h1>Hayvan Sesleri</h1></header>

<div class="animal-grid">
    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/2/29/439280_schots_angry-tiger.wav')">
        <div class="img-box">🐯</div>
        <b>Kaplan</b>
    </div>

    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/0/0d/Field_cricket_unedited.ogg')">
        <div class="img-box">🦗</div>
        <b>Circir Bocegi</b>
    </div>

    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/6/62/Meow.ogg')">
        <div class="img-box">🐱</div>
        <b>Kedi</b>
    </div>

    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/6/6d/%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D0%B8%D0%B9_%D0%9E%D1%81%D1%91%D0%BB%2C_%D0%9A%D0%B8%D0%BF%D1%80%D0%B8%D0%BE%D1%82%D1%81%D0%BA%D0%B8%D0%B9.ogg')">
        <div class="img-box">🫏</div>
        <b>Esek</b>
    </div>

    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/4/40/Elephant_voice_-_trumpeting.ogg')">
        <div class="img-box">🐘</div>
        <b>Fil</b>
    </div>

    <div class="animal-card" onclick="sesCal('https://upload.wikimedia.org/wikipedia/commons/f/f3/Meleagris_gallopavo_-_Wild_Turkey_XC136045.ogg')">
        <div class="img-box">🦃</div>
        <b>Hindi</b>
    </div>
</div>

<nav class="candy-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-house-chimney"></i></a>
    <a href="hikayeler.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    <a href="videolar.html" class="nav-link"><i class="fas fa-play-circle"></i></a>
    <a href="sesli-kitaplar.html" class="nav-link"><i class="fas fa-headphones"></i></a>
    <a href="boyama.html" class="nav-link"><i class="fas fa-palette"></i></a>
    <a href="hayvanlar.html" class="nav-link active"><i class="fas fa-paw"></i></a>
</nav>

<script>
    let player = new Audio();
    function sesCal(link) {
        player.src = link;
        player.play().catch(e => console.log("Ses yukleniyor..."));
    }
</script>

</body>
</html>
