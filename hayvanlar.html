<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hayvanlar Alemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --turuncu: #FB8500; --arka: #FFF9F0; }
        body { margin: 0; background: var(--arka); font-family: 'Fredoka One', cursive; padding-bottom: 120px; text-align: center; }
        header { background: var(--turuncu); padding: 25px; border-bottom: 8px solid #E87600; }
        h1 { margin: 0; color: white; font-size: 22px; }

        .animal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; }
        .animal-card {
            background: white; border-radius: 35px; padding: 20px; 
            border: 5px solid var(--turuncu); box-shadow: 0 8px 0 #FFD8A8;
            cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; align-items: center;
        }
        .animal-card:active { transform: scale(0.95); background: #FFF4E5; }
        .animal-card span { font-size: 60px; margin-bottom: 10px; }
        .animal-card b { color: #555; font-size: 16px; letter-spacing: 1px; }

        .candy-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; display: flex; justify-content: space-around;
            padding: 15px; border-radius: 40px; border: 4px solid var(--turuncu);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-link { color: #BBB; text-decoration: none; font-size: 24px; }
        .active { color: var(--turuncu); }
    </style>
</head>
<body>

<header><h1>Hayvan Sesleri</h1></header>

<div class="animal-grid">
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/2288/2288-preview.mp3')">
        <span>🦁</span><b>Aslan</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/1111/1111-preview.mp3')">
        <span>🐱</span><b>Kedi</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/2290/2290-preview.mp3')">
        <span>🐶</span><b>Kopek</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://www.soundjay.com/nature/sounds/elephant-trumpeting-01.mp3')">
        <span>🐘</span><b>Fil</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://www.soundjay.com/nature/sounds/monkey-1.mp3')">
        <span>🐒</span><b>Maymun</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/2287/2287-preview.mp3')">
        <span>🐔</span><b>Horoz</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/2289/2289-preview.mp3')">
        <span>🐄</span><b>Inek</b>
    </div>
    <div class="animal-card" onclick="sesCal('https://assets.mixkit.co/active_storage/sfx/2286/2286-preview.mp3')">
        <span>🦆</span><b>Ordek</b>
    </div>
</div>

</nav>

    let player = new Audio();
    function sesCal(link) {
        player.src = link;
        player.play();
    }
</script>

</body>
</html>
