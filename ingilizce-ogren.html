<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Öğren</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
:root { --sari: #FFCA3A; --arka: #FFFDF0; }

body {
    margin: 0;
    background: var(--arka);
    font-family: 'Fredoka One', cursive;
    padding-bottom: 120px;
}

header {
    background: var(--sari);
    padding: 25px;
    text-align: center;
    border-bottom: 8px solid #E5B534;
}

h1 {
    margin: 0;
    color: white;
    font-size: 22px;
}

.list {
    padding: 20px;
}

.word {
    background: white;
    border-radius: 25px;
    padding: 20px;
    margin-bottom: 15px;
    border: 4px solid var(--sari);
    text-align: center;
    font-size: 20px;
    cursor: pointer;
}

.word:hover {
    background: #fff3c4;
}
</style>

</head>

<body>

<header>
    <h1>İngilizce Öğren 🎓</h1>
</header>

<div class="list">

```
<div class="word" onclick="speak('Cat')">🐱 Cat (Kedi)</div>
<div class="word" onclick="speak('Dog')">🐶 Dog (Köpek)</div>
<div class="word" onclick="speak('Apple')">🍎 Apple (Elma)</div>
<div class="word" onclick="speak('Car')">🚗 Car (Araba)</div>
<div class="word" onclick="speak('Sun')">☀️ Sun (Güneş)</div>
<div class="word" onclick="speak('Moon')">🌙 Moon (Ay)</div>
```

</div>

<script>
function speak(word) {
    let speech = new SpeechSynthesisUtterance(word);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
